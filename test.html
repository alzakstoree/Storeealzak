<!DOCTYPE html>
<html>
<head>
    <title>طلبات ALZAK</title>
</head>
<body style="background: #111; color: #fff; padding: 20px;">
    <h1 style="color: #fbbf24;">📋 جميع الطلبات</h1>
    <div id="orders"></div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"></script>
    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyCO_VTLgQkTOv_MkB0SEdSEYdRMi9IdMFA",
            authDomain: "alzak-store-dea53.firebaseapp.com",
            projectId: "alzak-store-dea53"
        });

        const db = firebase.firestore();

        db.collection('orders').get().then(snapshot => {
            let html = '';
            snapshot.forEach(doc => {
                const o = doc.data();
                html += `<div style="border:2px solid #fbbf24; border-radius:15px; padding:15px; margin-bottom:15px; background:#1a1a1a;">
                    <strong>${o.product || '?'}</strong> - ${o.price || 0}$<br>
                    المستخدم: ${o.userEmail || '?'}<br>
                    الحالة: ${o.status || '?'}
                </div>`;
            });
            document.getElementById('orders').innerHTML = html || '<p>لا توجد طلبات</p>';
        }).catch(e => {
            document.getElementById('orders').innerHTML = '<p style="color:red;">❌ خطأ: ' + e.message + '</p>';
        });
    </script>
</body>
</html>
