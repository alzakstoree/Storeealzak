<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALZAK STORE - تشخيص</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"></script>
</head>
<body style="font-family: sans-serif; padding: 20px; background: #111; color: #fff; direction: rtl;">
    <h1 style="color: #fbbf24;">🔧 تشخيص المشكلة</h1>
    <div id="status" style="margin: 20px 0; padding: 15px; background: #222; border-radius: 10px;"></div>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCO_VTLgQkTOv_MkB0SEdSEYdRMi9IdMFA",
            authDomain: "alzak-store-dea53.firebaseapp.com",
            projectId: "alzak-store-dea53",
            storageBucket: "alzak-store-dea53.firebasestorage.app",
            messagingSenderId: "494547602038",
            appId: "1:494547602038:web:f9f78605414173ae63ed57"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const statusDiv = document.getElementById('status');

        function log(message, isError = false) {
            statusDiv.innerHTML += `<div style="color: ${isError ? '#ef4444' : '#22c55e'}; margin: 5px 0;">${message}</div>`;
        }

        log('✅ Firebase initialized');

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                log(`✅ مستخدم مسجل: ${user.email}`);
                
                // محاولة قراءة الطلبات
                try {
                    const snapshot = await db.collection('orders').get();
                    log(`✅ عدد الطلبات في Firestore: ${snapshot.size}`);
                    snapshot.forEach(doc => {
                        log(`- طلب: ${doc.data().product} (${doc.data().price}$)`);
                    });
                } catch (e) {
                    log(`❌ خطأ في قراءة الطلبات: ${e.message}`, true);
                }
            } else {
                log('❌ لا يوجد مستخدم مسجل', true);
            }
        });

        // دالة تسجيل الدخول
        window.login = async function() {
            try {
                await auth.signInWithEmailAndPassword('alolao45y@gmail.com', 'admin123');
                log('✅ تسجيل دخول ناجح');
            } catch (e) {
                log(`❌ خطأ تسجيل الدخول: ${e.message}`, true);
            }
        };
    </script>
    
    <button onclick="login()" style="background: #fbbf24; color: #000; border: none; padding: 15px 30px; border-radius: 30px; font-size: 16px; margin-top: 20px; cursor: pointer;">🔐 تسجيل دخول المدير</button>
</body>
</html>
