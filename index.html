<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #fff;
            transition: background 0.3s;
        }

        body.light-mode {
            background: #f5f5f5;
            color: #000;
        }

        .header {
            background: #000;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #fbbf24;
            position: relative;
        }

        .logo h1 {
            font-size: 22px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo span {
            font-size: 11px;
            color: #fbbf24;
            display: block;
        }

        .header-icons {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .header-icons i {
            font-size: 22px;
            cursor: pointer;
            color: #fbbf24;
        }

        .badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #fbbf24;
            color: #000;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 10px;
            font-weight: 700;
        }

        .profile-icon {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: url('https://i.ibb.co/1YJrvSr3/file-000000005428724691b0c7d13890c115-1.jpg') no-repeat center center/cover;
            border: 2px solid #fbbf24;
            cursor: pointer;
        }

        .side-menu {
            position: fixed;
            top: 0;
            right: -280px;
            width: 260px;
            height: 100vh;
            background: #111;
            border-left: 2px solid #fbbf24;
            transition: 0.3s;
            z-index: 10000;
            padding: 20px;
            overflow-y: auto;
        }

        .side-menu.show {
            right: 0;
        }

        .menu-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            color: #fbbf24;
        }

        .menu-header i {
            font-size: 24px;
            cursor: pointer;
        }

        .menu-items {
            list-style: none;
        }

        .menu-items li {
            margin-bottom: 20px;
        }

        .menu-items a {
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-radius: 10px;
        }

        .menu-items a:hover {
            background: #fbbf24;
            color: #000;
        }

        .menu-footer {
            margin-top: 40px;
            text-align: center;
            color: #666;
            font-size: 12px;
        }

        body.light-mode .side-menu {
            background: #fff;
        }

        body.light-mode .menu-items a {
            color: #000;
        }

        body.light-mode .menu-items a:hover {
            background: #fbbf24;
            color: #000;
        }

        .banner {
            width: 100%;
            height: 120px;
            margin: 10px 0;
            background: linear-gradient(145deg, #000, #1a1a1a);
            border-top: 2px solid #fbbf24;
            border-bottom: 2px solid #fbbf24;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9;
        }

        .breadcrumb {
            padding: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-bottom: 1px solid #333;
            flex-wrap: wrap;
        }

        .breadcrumb i {
            color: #fbbf24;
            cursor: pointer;
        }

        .breadcrumb span {
            cursor: pointer;
            color: #fbbf24;
        }

        .breadcrumb span:last-child {
            color: #fff;
            cursor: default;
        }

        .main-categories {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 15px;
        }

        .section-card {
            width: 100%;
            height: 150px;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .section-image {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
        }

        .section-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 24px;
        }

        .section-overlay i {
            color: #fbbf24;
            font-size: 30px;
        }

        .category-card {
            width: 100%;
            height: 100px;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .category-image {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .category-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 15px;
        }

        .product-card {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;

        .product-card:hover {
            border-color: #fbbf24;
        }

            font-weight: 900;

            border: none;
            padding: 10px;
            border-radius: 30px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
        }

        .admin-panel {

            top: 50%;
            left: 50%;

            height: 85vh;

        .admin-header h2 {
            color: #fbbf24;
        }

        .admin-header button {

            border: none;
            color: #fbbf24;
            font-size: 24px;
            cursor: pointer;
        }

        .admin-tabs {

            flex-wrap: wrap;
            margin-bottom: 15px;

        .tab-btn {
            flex: 1;
            min-width: 70px;
            background: #1a1a1a;
            color: #fff;
            border: 1px solid #333;
            padding: 12px 5px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
        }

        .tab-btn.active {
            background: #fbbf24;
            color: #000;
            font-weight: 700;
        }

        .admin-tab-content {
            display: none;
        }

        .admin-tab-content.active {
            display: block;
        }

        .product-edit-card {
            background: #1a1a1a;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .product-edit-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;

            background: #333;
            border: 1px solid #fbbf24;
            border-radius: 10px;
            padding: 12px;
            color: #fff;
            font-size: 16px;

        .product-edit-actions {
            display: flex;
            gap: 5px;

        .product-edit-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
        }

        .save-btn {
            background: #22c55e;
            color: #fff;
        }

        .delete-btn {
            background: #ef4444;
            color: #fff;
        }

        .add-btn {
            width: 100%;
            background: #fbbf24;
            color: #000;
            border: none;
            border-radius: 10px;
            padding: 15px;
            font-weight: 700;
            margin-top: 10px;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            align-items: center;
            justify-content: center;
            padding: 15px;
            z-index: 9999;
        }

        .modal-content {
            background: #111;
            border: 2px solid #fbbf24;
            border-radius: 25px;
            padding: 25px;
            width: 100%;
            max-width: 400px;
        }

        .modal-content input,
        .modal-content select {
            width: 100%;
            background: #333;
            border: 1px solid #fbbf24;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            color: #fff;
            font-size: 16px;
        }

        .modal-content button {
            width: 100%;
            background: #fbbf24;
            color: #000;
            border: none;
            border-radius: 10px;
            padding: 15px;
            font-weight: 700;
            margin: 5px 0;
            cursor: pointer;
        }

        .close {
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 28px;
            color: #fbbf24;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 15px;
            right: 15px;
            background: #111;
            border: 2px solid #fbbf24;
            padding: 15px;
            border-radius: 30px;
            text-align: center;
            transform: translateY(200%);
            transition: 0.3s;
            z-index: 10001;
        }

        .toast.show {
            transform: translateY(0);
        }

        @media (max-width: 480px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

                await updateProfile(userCredential.user, { displayName: name });
                showToast('✅ تم التسجيل بنجاح');
                document.getElementById('registerModal').style.display = 'none';
            } catch (error) {
                showToast('❌ ' + error.message, 'error');
            }
        };

        window.loginWithGoogle = async function() {
            try {
                await signInWithPopup(auth, provider);
                document.getElementById('authModal').style.display = 'none';
                showToast('✅ مرحباً بك');
            } catch (error) {
                showToast('❌ ' + error.message, 'error');
            }
        };

        window.logout = async function() {
            await signOut(auth);
            showToast('✅ تم تسجيل الخروج');
            hideAdminPanel();
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = {
                    uid: user.uid,
                    email: user.email,
                    name: user.displayName || user.email.split('@')[0]
                };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                updateUI();
                updateAdminMenu();
                await createUserProfile(user);
                updateWalletDisplay();
            } else {
                currentUser = null;
                localStorage.removeItem('currentUser');
                updateUI();
                updateAdminMenu();
            }
        });

        async function createUserProfile(user) {
            const userRef = doc(db, 'users', user.uid);
            const docSnap = await getDoc(userRef);
            if (!docSnap.exists()) {
                await setDoc(userRef, {
                    email: user.email,
                    name: user.displayName || user.email.split('@')[0],
                    createdAt: new Date().toISOString(),
                    walletBalance: 0
                });
            }
        }

        async function getWalletBalance() {
            if (!currentUser) return 0;
            const docRef = doc(db, 'users', currentUser.uid);
            const docSnap = await getDoc(docRef);
            return docSnap.data()?.walletBalance || 0;
        }

        async function updateWalletDisplay() {
            if (!currentUser) return;
            const balance = await getWalletBalance();
            document.getElementById('walletBalance').textContent = balance + '$';
            
            const q = query(
                collection(db, 'transactions'),
                where('userId', '==', currentUser.uid),
                orderBy('date', 'desc'),
                limit(5)
            );
            const querySnapshot = await getDocs(q);
            let html = '';
            querySnapshot.forEach(doc => {
                const t = doc.data();
                html += `<div style="display: flex; justify-content: space-between; padding: 5px; border-bottom: 1px solid #333;">
                    <span>${t.description}</span>
                    <span style="color: ${t.type === 'charge' ? '#22c55e' : '#fbbf24'}">${t.type === 'charge' ? '+' : '-'}${t.amount}$</span>
                </div>`;
            });
            document.getElementById('walletTransactions').innerHTML = html || '<p style="text-align: center;">لا توجد حركات</p>';
        }

        window.requestCharge = async function() {
            if (!currentUser) {
                showToast('❌ سجل دخول أولاً', 'error');
                showAuthModal();
                return;
            }
            const amount = parseFloat(document.getElementById('chargeAmount').value);
            await addDoc(collection(db, 'charges'), {
                userId: currentUser.uid,
                userEmail: currentUser.email,
                amount: amount,
                status: 'pending',
                date: new Date().toISOString()
            });
            showToast('✅ تم إرسال طلب الشحن');
            closeModal('walletModal');
        };

        window.confirmPurchase = async function() {
            if (!currentUser) {
                showToast('❌ سجل دخول أولاً', 'error');
                showAuthModal();
                return;
            }
            const playerId = document.getElementById('playerId').value;
            if (!playerId) {
                showToast('❌ أدخل معرف اللعبة', 'error');
                return;
            }
            const balance = await getWalletBalance();
            if (balance < currentPurchase.price) {
                showToast('❌ رصيد غير كافٍ', 'error');
                return;
            }
            const userRef = doc(db, 'users', currentUser.uid);
            try {
                await runTransaction(db, async (transaction) => {
                    const userDoc = await transaction.get(userRef);
                    const newBalance = userDoc.data().walletBalance - currentPurchase.price;
                    transaction.update(userRef, { walletBalance: newBalance });
                    await addDoc(collection(db, 'orders'), {
                        userId: currentUser.uid,
                        userEmail: currentUser.email,
                        product: currentPurchase.name,
                        price: currentPurchase.price,
                        playerId: playerId,
                        status: 'pending',
                        createdAt: new Date().toISOString()
                    });
                    await addDoc(collection(db, 'transactions'), {
                        userId: currentUser.uid,
                        type: 'purchase',
                        amount: currentPurchase.price,
                        description: 'شراء ' + currentPurchase.name,
                        date: new Date().toISOString()
                    });
                });
                showToast('✅ تم الشراء بنجاح');
                closeModal('purchaseModal');
                updateWalletDisplay();
            } catch (error) {
                showToast('❌ فشل الشراء', 'error');
            }
        };

        window.showMyOrders = async function() {
            if (!currentUser) {
                showToast('❌ سجل دخول أولاً', 'error');
                showAuthModal();
                return;
            }
            const q = query(
                collection(db, 'orders'),
                where('userId', '==', currentUser.uid),
                orderBy('createdAt', 'desc')
            );
            const querySnapshot = await getDocs(q);
            let html = '';
            querySnapshot.forEach(doc => {
                const o = doc.data();
                html += `
                    <div style="background: #1a1a1a; border-radius: 10px; padding: 15px; margin-bottom: 10px;">
                        <div style="display: flex; justify-content: space-between;">
                            <span>${o.product}</span>
                            <span style="color: #fbbf24;">${o.price}$</span>
                        </div>
                        <div style="font-size: 12px;">معرف: ${o.playerId}</div>
                        <div style="margin-top: 10px;">
                            <span style="background: ${o.status === 'pending' ? '#fbbf24' : '#22c55e'}; color: #000; padding: 5px 10px; border-radius: 20px;">${o.status === 'pending' ? '⏳ قيد الانتظار' : '✅ مكتمل'}</span>
                        </div>
                    </div>
                `;
            });
            document.getElementById('ordersList').innerHTML = html || '<p style="text-align: center;">لا توجد طلبات</p>';
            document.getElementById('ordersModal').style.display = 'flex';
        };

        async function loadAdminOrders() {
            if (!isAdmin()) return;
            const querySnapshot = await getDocs(collection(db, 'orders'));
            let html = '<h3>📋 جميع الطلبات</h3>';
            querySnapshot.forEach(doc => {
                const o = doc.data();
                html += `
                    <div style="background: #1a1a1a; border-radius: 10px; padding: 15px; margin-bottom: 10px;">
                        <div>${o.product} - ${o.price}$</div>
                        <div style="font-size: 12px;">المستخدم: ${o.userEmail}</div>
                        <div style="font-size: 12px;">معرف: ${o.playerId}</div>
                        <select id="order_${doc.id}" style="width: 100%; margin: 10px 0;">
                            <option value="pending" ${o.status === 'pending' ? 'selected' : ''}>⏳ قيد الانتظار</option>
                            <option value="completed" ${o.status === 'completed' ? 'selected' : ''}>✅ مكتمل</option>
                        </select>
                        <button onclick="updateOrderStatus('${doc.id}')" style="width: 100%; background: #fbbf24; border: none; padding: 10px; border-radius: 10px;">تحديث</button>
                    </div>
                `;
            });
            document.getElementById('adminOrders').innerHTML = html;
        }

        window.updateOrderStatus = async function(orderId) {
            const select = document.getElementById(`order_${orderId}`);
            if (!select) return;
            await updateDoc(doc(db, 'orders', orderId), {
                status: select.value
            });
            showToast('✅ تم التحديث');
            loadAdminOrders();
        };

        async function loadAdminUsers() {
            if (!isAdmin()) return;
            const querySnapshot = await getDocs(collection(db, 'users'));
            let html = '<h3>👥 العملاء</h3><table style="width: 100%; border-collapse: collapse;"><tr><th>الاسم</th><th>البريد</th><th>الرصيد</th></tr>';
            querySnapshot.forEach(doc => {
                const u = doc.data();
                html += `<tr><td>${u.name}</td><td>${u.email}</td><td>${u.walletBalance || 0}$</td></tr>`;
            });
            html += '</table>';
            document.getElementById('adminUsers').innerHTML = html;
        }

        async function loadAdminStats() {
            if (!isAdmin()) return;
            const usersSnap = await getDocs(collection(db, 'users'));
            const ordersSnap = await getDocs(collection(db, 'orders'));
            let totalOrders = 0, totalSales = 0, pendingOrders = 0;
            ordersSnap.forEach(doc => {
                const o = doc.data();
                totalOrders++;
                totalSales += o.price || 0;
                if (o.status === 'pending') pendingOrders++;
            });
            document.getElementById('adminStats').innerHTML = `
                <h3>📊 الإحصائيات</h3>
                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;">
                    <div style="background: #1a1a1a; border-radius: 15px; padding: 20px; text-align: center;">
                        <div style="font-size: 32px; color: #fbbf24;">${usersSnap.size}</div>
                        <div>العملاء</div>
                    </div>
                    <div style="background: #1a1a1a; border-radius: 15px; padding: 20px; text-align: center;">
                        <div style="font-size: 32px; color: #fbbf24;">${totalOrders}</div>
                        <div>الطلبات</div>
                    </div>
                    <div style="background: #1a1a1a; border-radius: 15px; padding: 20px; text-align: center;">
                        <div style="font-size: 32px; color: #fbbf24;">${pendingOrders}</div>
                        <div>قيد الانتظار</div>
                    </div>
                    <div style="background: #1a1a1a; border-radius: 15px; padding: 20px; text-align: center;">
                        <div style="font-size: 32px; color: #fbbf24;">${totalSales}$</div>
                        <div>المبيعات</div>
                    </div>
                </div>
            `;
        }

        function loadAdminProducts() {
            let html = '<h3>📦 إدارة المنتجات</h3>';
            storeData.sections.forEach((section, s) => {
                section.categories.forEach((category, c) => {
                    html += `<div style="margin-bottom: 20px;"><h4 style="color: #fbbf24;">${category.name}</h4>`;
                    category.products.forEach((product, p) => {
                        html += `
                            <div class="product-edit-card">
                                <div class="product-edit-row">
                                    <input type="text" id="name_${s}_${c}_${p}" value="${product.name}">
                                    <input type="number" id="price_${s}_${c}_${p}" value="${product.price}" step="0.01">
                                </div>
                                <div class="product-edit-actions">
                                    <button class="save-btn" onclick="updateProduct(${s},${c},${p})">💾 حفظ</button>
                                    <button class="delete-btn" onclick="deleteProduct(${s},${c},${p})">🗑️ حذف</button>
                                </div>
                            </div>
                        `;
                    });
                    html += `
                        <div style="margin-top: 10px;">
                            <input type="text" id="new_name_${s}_${c}" placeholder="اسم المنتج الجديد" style="width: 100%; background: #333; border: 1px solid #fbbf24; border-radius: 10px; padding: 12px; margin-bottom: 10px; color: #fff;">
                            <input type="number" id="new_price_${s}_${c}" placeholder="السعر" step="0.01" style="width: 100%; background: #333; border: 1px solid #fbbf24; border-radius: 10px; padding: 12px; margin-bottom: 10px; color: #fff;">
                            <button class="add-btn" onclick="addProduct(${s},${c})">➕ إضافة منتج</button>
                        </div>
                    `;
                    html += `</div>`;
                });
            });
            document.getElementById('adminProducts').innerHTML = html;
        }

        window.updateProduct = function(s, c, p) {
            const name = document.getElementById(`name_${s}_${c}_${p}`).value;
            const price = parseFloat(document.getElementById(`price_${s}_${c}_${p}`).value);
            if (!name || isNaN(price)) return showToast('بيانات غير صحيحة', 'error');
            storeData.sections[s].categories[c].products[p].name = name;
            storeData.sections[s].categories[c].products[p].price = price;
            localStorage.setItem('storeData', JSON.stringify(storeData));
            showToast('✅ تم التعديل');
        };

        window.deleteProduct = function(s, c, p) {
            if (!confirm('حذف المنتج؟')) return;
            storeData.sections[s].categories[c].products.splice(p, 1);
            localStorage.setItem('storeData', JSON.stringify(storeData));
            loadAdminProducts();
            showToast('✅ تم الحذف');
        };

        window.addProduct = function(s, c) {
            const name = document.getElementById(`new_name_${s}_${c}`).value;
            const price = parseFloat(document.getElementById(`new_price_${s}_${c}`).value);
            if (!name || isNaN(price)) return showToast('بيانات غير صحيحة', 'error');
            storeData.sections[s].categories[c].products.push({ name, price });
            localStorage.setItem('storeData', JSON.stringify(storeData));
            document.getElementById(`new_name_${s}_${c}`).value = '';
            document.getElementById(`new_price_${s}_${c}`).value = '';
            loadAdminProducts();
            showToast('✅ تمت الإضافة');
        };

        function isAdmin() {
            return currentUser && currentUser.email === ADMIN_EMAIL;
        }

        window.showAdminPanel = function() {
            if (!isAdmin()) {
                showToast('غير مصرح لك بالدخول', 'error');
                return;
            }
            document.getElementById('adminPanel').style.display = 'block';
            loadAdminProducts();
            loadAdminOrders();
            loadAdminUsers();
            loadAdminStats();
        };

        window.hideAdminPanel = function() {
            document.getElementById('adminPanel').style.display = 'none';
        };

        window.showAdminTab = function(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.admin-tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('admin' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
            if (tab === 'products') loadAdminProducts();
            if (tab === 'orders') loadAdminOrders();
            if (tab === 'users') loadAdminUsers();
            if (tab === 'stats') loadAdminStats();
        };

        window.toggleSideMenu = function() {
            document.getElementById('sideMenu').classList.toggle('show');
        };

        window.toggleTheme = function() {
            document.body.classList.toggle('light-mode');
        };

        function updateAdminMenu() {
            const adminMenuItem = document.getElementById('adminMenuItem');
            if (adminMenuItem) {
                adminMenuItem.style.display = isAdmin() ? 'block' : 'none';
            }
            const adminLink = document.getElementById('adminLink');
            if (adminLink) {
                adminLink.style.display = isAdmin() ? 'block' : 'none';
            }
        }

        window.showMainCategories = function() {
            const container = document.getElementById('mainCategories');
            if (!container) return;
            container.innerHTML = '';
            storeData.sections.forEach(section => {
                container.innerHTML += `
                    <div class="section-card" onclick="showCategories('${section.id}')">
                        <div class="section-image" style="background-image: url('${section.image}')">
                            <div class="section-overlay">
                                <i class="fas ${section.icon}"></i>
                                <h3>${section.name}</h3>
                            </div>
                        </div>
                    </div>
                `;
            });
            document.getElementById('subContent').innerHTML = '';
            updateBreadcrumb([{ name: 'الرئيسية' }]);
        };

        window.showCategories = function(sectionId) {
            const section = storeData.sections.find(s => s.id === sectionId);
            if (!section) return;
            const container = document.getElementById('subContent');
            if (!container) return;
            container.innerHTML = `<h2 style="color: #fbbf24; text-align: center; margin: 15px;">${section.name}</h2>`;
            section.categories.forEach(cat => {
                container.innerHTML += `
                    <div class="category-card" onclick="showProducts('${section.id}', '${cat.id}')">
                        <div class="category-image" style="background-image: url('${cat.image}')">
                            <div class="category-overlay">
                                <h4>${cat.name}</h4>
                            </div>
                        </div>
                    </div>
                `;
            });
            updateBreadcrumb([
                { name: 'الرئيسية', onclick: 'showMainCategories()' },
                { name: section.name }
            ]);
        };

        window.showProducts = function(sectionId, categoryId) {
            const section = storeData.sections.find(s => s.id === sectionId);
            if (!section) return;
            const category = section.categories.find(c => c.id === categoryId);
            if (!category) return;
            const container = document.getElementById('subContent');
            if (!container) return;
            let html = `<h2 style="color: #fbbf24; text-align: center; margin: 15px;">${category.name}</h2><div class="products-grid">`;
            category.products.forEach(prod => {
                html += `
                    <div class="product-card" onclick="openPurchaseModal('${prod.name}', ${prod.price})">
                        <h4>${prod.name}</h4>
                        <p class="price">${prod.price} $</p>
                        <button class="buy-btn">اشتري</button>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
            updateBreadcrumb([
                { name: 'الرئيسية', onclick: 'showMainCategories()' },
                { name: section.name, onclick: `showCategories('${section.id}')` },
                { name: category.name }
            ]);
        };

        function updateBreadcrumb(path) {
            const bc = document.getElementById('breadcrumb');
            if (!bc) return;
            bc.innerHTML = '<i class="fas fa-home" onclick="showMainCategories()"></i>';
            path.forEach((item, i) => {
                if (item.onclick) {
                    bc.innerHTML += `<span onclick="${item.onclick}">${item.name}</span>`;
                } else {
                    bc.innerHTML += `<span>${item.name}</span>`;
                }
                if (i < path.length - 1) bc.innerHTML += `<i class="fas fa-chevron-left"></i>`;
            });
        }

        window.openPurchaseModal = function(name, price) {
            if (!currentUser) {
                showToast('سجل دخول أولاً', 'error');
                showAuthModal();
                return;
            }
            currentPurchase = { name, price };
            document.getElementById('purchaseDetails').innerHTML = `<p>المنتج: ${name}</p><p>السعر: ${price}$</p>`;
            document.getElementById('purchaseModal').style.display = 'flex';
        };

        window.showToast = function(message, type = 'success') {
            const toast = document.getElementById('toast');
            if (!toast) return;
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        };

        window.showAuthModal = function() {
            document.getElementById('authModal').style.display = 'flex';
        };

        window.showRegisterModal = function() {
            closeModal('authModal');
            document.getElementById('registerModal').style.display = 'flex';
        };

        window.closeModal = function(id) {
            document.getElementById(id).style.display = 'none';
        };

        window.toggleDropdown = function() {
            const d = document.getElementById('userDropdown');
            if (d) d.style.display = d.style.display === 'none' ? 'block' : 'none';
        };

        window.showWallet = function() {
            if (!currentUser) {
                showToast('سجل دخول أولاً', 'error');
                showAuthModal();
                return;
            }
            updateWalletDisplay();
            document.getElementById('walletModal').style.display = 'flex';
        };

        function updateUI() {
            const loginIcon = document.getElementById('loginIcon');
            const userMenu = document.getElementById('userMenu');
            const userName = document.getElementById('userName');
            if (currentUser) {
                if (loginIcon) loginIcon.style.display = 'none';
                if (userMenu) {
                    userMenu.style.display = 'flex';
                    if (userName) userName.textContent = currentUser.name;
                }
            } else {
                if (loginIcon) loginIcon.style.display = 'block';
                if (userMenu) userMenu.style.display = 'none';
            }
        }

        window.onload = function() {
            showMainCategories();
            updateUI();
            updateAdminMenu();
        };
    </script>
</body>
</html>
