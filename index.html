<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>ALZAK STORE | المتجر الرسمي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #fff; transition: background 0.3s, color 0.3s; }
        body.light-mode { background: #f5f5f5; color: #000; }
        body.light-mode .header, body.light-mode .admin-panel { background: #fff; color: #000; border-color: #fbbf24; }

        /* ===== الهيدر ===== */
        .header { background: #000; padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid #fbbf24; }
        .logo h1 { font-size: 24px; font-weight: 900; background: linear-gradient(135deg, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo span { font-size: 12px; color: #fbbf24; }
        .icons { display: flex; gap: 20px; align-items: center; }
        .icons i { font-size: 20px; cursor: pointer; position: relative; }
        .badge { position: absolute; top: -8px; right: -8px; background: #fbbf24; color: #000; font-size: 10px; padding: 2px 6px; border-radius: 50%; font-weight: 700; }
        #userSection { position: relative; }
        #userMenu { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        #userMenu img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #fbbf24; }
        .dropdown { position: absolute; top: 45px; left: 0; background: #1a1a1a; border: 2px solid #fbbf24; border-radius: 15px; padding: 10px; min-width: 150px; display: none; z-index: 1000; }
        #userMenu:hover .dropdown { display: block; }
        .dropdown a { display: block; padding: 8px 15px; color: #fff; text-decoration: none; border-radius: 10px; }
        .dropdown a:hover { background: #fbbf24; color: #000; }

        /* ===== مسار التنقل ===== */
        .breadcrumb { padding: 15px; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid #333; flex-wrap: wrap; }
        .breadcrumb i { color: #fbbf24; cursor: pointer; }
        .breadcrumb span { cursor: pointer; color: #fbbf24; }
        .breadcrumb span:last-child { color: #fff; cursor: default; }

        /* ===== الأقسام الرئيسية ===== */
        .main-categories { display: flex; flex-direction: column; gap: 15px; padding: 15px; }
        .section-card { width: 100%; height: 150px; border-radius: 20px; overflow: hidden; cursor: pointer; position: relative; }
        .section-image { width: 100%; height: 100%; background-size: cover; background-position: center; position: relative; }
        .section-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 24px; color: white; }
        .section-overlay i { color: #fbbf24; font-size: 30px; }

        /* ===== الفئات الفرعية ===== */
        .sub-content { padding: 15px; }
        .section-title { margin-bottom: 20px; color: #fbbf24; text-align: center; }
        .category-card { width: 100%; height: 120px; border-radius: 15px; overflow: hidden; margin-bottom: 15px; cursor: pointer; }
        .category-image { width: 100%; height: 100%; background-size: cover; background-position: center; position: relative; }
        .category-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; }

        /* ===== المنتجات ===== */
        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .product-card { background: #1a1a1a; border: 2px solid #333; border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; transition: 0.3s; }
        .product-card:hover { border-color: #fbbf24; transform: translateY(-5px); }
        .product-card .price { color: #fbbf24; font-size: 20px; font-weight: 900; margin: 10px 0; }
        .buy-btn { background: #fbbf24; color: #000; border: none; padding: 10px; border-radius: 30px; font-weight: 700; width: 100%; cursor: pointer; }

        /* ===== لوحة المدير ===== */
        .admin-panel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 800px; height: 80vh; background: #111; border: 3px solid #fbbf24; border-radius: 30px; padding: 20px; z-index: 10000; overflow-y: auto; display: none; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .admin-tabs { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .tab-btn { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 10px 15px; border-radius: 30px; cursor: pointer; }
        .tab-btn.active { background: #fbbf24; color: #000; }
        .admin-tab-content { display: none; }
        .admin-tab-content.active { display: block; }
        .admin-table { width: 100%; border-collapse: collapse; }
        .admin-table th { background: #fbbf24; color: #000; padding: 10px; }
        .admin-table td { padding: 10px; border-bottom: 1px solid #333; }
        .status-badge.pending { background: #fbbf24; color: #000; padding: 3px 10px; border-radius: 20px; }
        .status-badge.completed { background: #22c55e; color: #fff; padding: 3px 10px; border-radius: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .stat-card { background: #1a1a1a; padding: 20px; border-radius: 15px; text-align: center; }
        .stat-value { display: block; font-size: 30px; color: #fbbf24; font-weight: 900; }

        /* ===== النوافذ المنبثقة ===== */
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 9999; align-items: center; justify-content: center; padding: 15px; }
        .modal-content { background: #111; border-radius: 30px; padding: 30px 20px; width: 100%; max-width: 400px; border: 2px solid #fbbf24; position: relative; }
        .close { position: absolute; top: 15px; left: 20px; font-size: 24px; color: #fbbf24; cursor: pointer; }
        .modal-content h2 { color: #fbbf24; text-align: center; margin-bottom: 20px; }
        .modal-content input { width: 100%; padding: 12px; margin: 10px 0; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; color: #fff; }
        .modal-content button { width: 100%; padding: 12px; background: #fbbf24; color: #000; border: none; border-radius: 30px; font-weight: 700; margin: 10px 0; cursor: pointer; }

        /* ===== المحفظة ===== */
        .wallet-balance { font-size: 36px; color: #fbbf24; text-align: center; margin: 20px 0; }
        .charge-options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 15px 0; }
        .charge-options button { background: #1a1a1a; border: 1px solid #fbbf24; padding: 10px; }
        .transaction { display: flex; justify-content: space-between; padding: 10px; margin: 5px 0; background: #1a1a1a; border-radius: 8px; }

        /* ===== الإشعارات ===== */
        .toast { position: fixed; bottom: 20px; left: 15px; right: 15px; background: #111; border: 2px solid #fbbf24; color: #fff; padding: 15px; border-radius: 30px; text-align: center; transform: translateY(200%); transition: 0.3s; z-index: 10001; }
        .toast.show { transform: translateY(0); }
        #loading { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10002; background: #111; padding: 20px; border-radius: 20px; border: 2px solid #fbbf24; text-align: center; }
        #loading i { color: #fbbf24; font-size: 40px; }
        @media (max-width: 480px) { .products-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <!-- مؤشر التحميل -->
    <div id="loading"><i class="fas fa-spinner fa-spin"></i><p>جاري التحميل...</p></div>

    <!-- الهيدر -->
    <div class="header">
        <div class="logo"><h1>ALZAK STORE</h1><span>المتجر الرسمي</span></div>
        <div class="icons">
            <i class="fas fa-wallet" onclick="showWallet()"></i>
            <i class="fas fa-shopping-cart" onclick="showOrders()"><span class="badge" id="cartBadge">0</span></i>
            <div id="userSection">
                <i class="fas fa-user" onclick="showAuthModal()" id="loginIcon"></i>
                <div id="userMenu" style="display: none;">
                    <span id="userName"></span>
                    <div class="dropdown">
                        <a href="#" onclick="showWallet()">محفظتي</a>
                        <a href="#" onclick="showOrders()">طلباتي</a>
                        <a href="#" id="adminLink" style="display: none;" onclick="showAdminPanel()">لوحة المدير</a>
                        <a href="#" onclick="logout()">تسجيل خروج</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- مسار التنقل -->
    <div class="breadcrumb" id="breadcrumb"><i class="fas fa-home" onclick="showMainCategories()"></i></div>

    <!-- الأقسام الرئيسية -->
    <div id="mainCategories" class="main-categories"></div>
    <!-- الفئات الفرعية والمنتجات -->
    <div id="subContent" class="sub-content"></div>

    <!-- لوحة المدير -->
    <div id="adminPanel" class="admin-panel">
        <div class="admin-header"><h2><i class="fas fa-crown"></i> لوحة التحكم</h2><button onclick="hideAdminPanel()"><i class="fas fa-times"></i></button></div>
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="showAdminTab('products')">المنتجات</button>
            <button class="tab-btn" onclick="showAdminTab('orders')">الطلبات</button>
            <button class="tab-btn" onclick="showAdminTab('charges')">الشحن</button>
            <button class="tab-btn" onclick="showAdminTab('stats')">الإحصائيات</button>
        </div>
        <div id="adminProducts" class="admin-tab-content active"></div>
        <div id="adminOrders" class="admin-tab-content"></div>
        <div id="adminCharges" class="admin-tab-content"></div>
        <div id="adminStats" class="admin-tab-content"></div>
    </div>

    <!-- النوافذ المنبثقة -->
    <div id="authModal" class="modal"><div class="modal-content"><span class="close" onclick="closeModal('authModal')">&times;</span><h2>تسجيل الدخول</h2><input type="email" id="loginEmail" placeholder="البريد الإلكتروني"><input type="password" id="loginPassword" placeholder="كلمة المرور"><button onclick="login()">دخول</button><p>ليس لديك حساب؟ <a href="#" onclick="showRegister()">سجل الآن</a></p></div></div>
    <div id="registerModal" class="modal"><div class="modal-content"><span class="close" onclick="closeModal('registerModal')">&times;</span><h2>تسجيل جديد</h2><input type="text" id="regName" placeholder="الاسم"><input type="email" id="regEmail" placeholder="البريد الإلكتروني"><input type="password" id="regPassword" placeholder="كلمة المرور"><button onclick="register()">تسجيل</button></div></div>
    <div id="walletModal" class="modal"><div class="modal-content"><span class="close" onclick="closeModal('walletModal')">&times;</span><h2>محفظتي</h2><div class="wallet-balance" id="walletBalance">0 $</div><h3>شحن الرصيد</h3><div class="charge-options"><button onclick="chargeWallet(5)">5 $</button><button onclick="chargeWallet(10)">10 $</button><button onclick="chargeWallet(20)">20 $</button><button onclick="chargeWallet(50)">50 $</button></div><h3>آخر الحركات</h3><div id="transactions"></div></div></div>
    <div id="purchaseModal" class="modal"><div class="modal-content"><span class="close" onclick="closeModal('purchaseModal')">&times;</span><h2>تأكيد الشراء</h2><div id="purchaseDetails"></div><input type="text" id="playerId" placeholder="معرف اللعبة / الحساب"><button onclick="confirmPurchase()">تأكيد الشراء</button></div></div>

    <!-- الإشعارات -->
    <div id="toast" class="toast"></div>

    <script>
        // ==================== بيانات المتجر ====================
        const storeData = {
            sections: [
                { id: 'games', name: 'الألعاب', icon: 'fa-gamepad', image: 'https://i.ibb.co/vc4DVH2C/Screenshot-20260312-002402.png',
                    categories: [
                        { id: 'pubg', name: 'PUBG', image: 'https://i.ibb.co/vc4DVH2C/Screenshot-20260312-002402.png',
                            products: [
                                { name: '60 UC', price: 0.99 }, { name: '300 UC + 25', price: 4.99 }, { name: '600 UC + 60', price: 9.99 },
                                { name: '1500 UC + 300', price: 24.99 }, { name: '3000 UC + 850', price: 49.99 }, { name: '6000 UC + 2000', price: 99.99 }
                            ] },
                        { id: 'freefire', name: 'Free Fire', image: 'https://i.ibb.co/vc4DVH2C/Screenshot-20260312-002402.png',
                            products: [
                                { name: '100 جوهرة', price: 1.50 }, { name: '341 جوهرة', price: 3.99 }, { name: '572 جوهرة', price: 5.99 },
                                { name: '1060 جوهرة', price: 11.99 }, { name: '2079 جوهرة', price: 24.99 }, { name: '5600 دايموند', price: 49.99 }
                            ] }
                    ] },
                { id: 'apps', name: 'التطبيقات', icon: 'fa-mobile-alt', image: 'https://i.ibb.co/dpjQfMPQ/Screenshot-20260312-001846.png',
                    categories: [
                        { id: 'shahid', name: 'شاهد VIP', image: 'https://i.ibb.co/dpjQfMPQ/Screenshot-20260312-001846.png',
                            products: [ { name: 'شهر واحد', price: 5.99 }, { name: '3 شهور', price: 15.99 }, { name: 'سنة كاملة', price: 49.99 } ] },
                        { id: 'netflix', name: 'نتفلكس', image: 'https://i.ibb.co/dpjQfMPQ/Screenshot-20260312-001846.png',
                            products: [ { name: 'شهر واحد', price: 7.99 }, { name: '3 شهور', price: 21.99 }, { name: 'سنة كاملة', price: 79.99 } ] }
                    ] },
                { id: 'cards', name: 'بطاقات جوجل', icon: 'fa-google', image: 'https://i.ibb.co/qF95JZfM/Screenshot-20260312-002552.png',
                    categories: [
                        { id: 'google', name: 'بطاقات جوجل بلاي', image: 'https://i.ibb.co/qF95JZfM/Screenshot-20260312-002552.png',
                            products: [ { name: 'بطاقة 10$', price: 10.00 }, { name: 'بطاقة 25$', price: 25.00 }, { name: 'بطاقة 50$', price: 50.00 } ] }
                    ] }
            ]
        };

        // ==================== المتغيرات العامة ====================
        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
        let currentPurchase = null;
        const ADMIN_EMAIL = 'alolao45y@gmail.com';
        let wallets = JSON.parse(localStorage.getItem('wallets')) || {};

        // ==================== دوال الأقسام ====================
        function showMainCategories() {
            const container = document.getElementById('mainCategories'); if (!container) return;
            container.innerHTML = '';
            storeData.sections.forEach(section => {
                container.innerHTML += `<div class="section-card" onclick="showCategories('${section.id}')"><div class="section-image" style="background-image: url('${section.image}')"><div class="section-overlay"><i class="fas ${section.icon}"></i><h3>${section.name}</h3></div></div></div>`;
            });
            document.getElementById('subContent').innerHTML = '';
            updateBreadcrumb([{ name: 'الرئيسية' }]);
        }

        function showCategories(sectionId) {
            const section = storeData.sections.find(s => s.id === sectionId); if (!section) return;
            const container = document.getElementById('subContent'); if (!container) return;
            container.innerHTML = `<h2 class="section-title">${section.name}</h2>`;
            section.categories.forEach(cat => {
                container.innerHTML += `<div class="category-card" onclick="showProducts('${sectionId}', '${cat.id}')"><div class="category-image" style="background-image: url('${cat.image}')"><div class="category-overlay"><h4>${cat.name}</h4></div></div></div>`;
            });
            updateBreadcrumb([{ name: 'الرئيسية', onclick: 'showMainCategories()' }, { name: section.name }]);
        }

        function showProducts(sectionId, categoryId) {
            const section = storeData.sections.find(s => s.id === sectionId); if (!section) return;
            const category = section.categories.find(c => c.id === categoryId); if (!category) return;
            const container = document.getElementById('subContent'); if (!container) return;
            let html = `<h2 class="section-title">${category.name}</h2><div class="products-grid">`;
            category.products.forEach(prod => {
                html += `<div class="product-card" onclick="openPurchaseModal('${prod.name}', ${prod.price})"><h4>${prod.name}</h4><p class="price">${prod.price} $</p><button class="buy-btn">اشتري</button></div>`;
            });
            html += '</div>';
            container.innerHTML = html;
            updateBreadcrumb([{ name: 'الرئيسية', onclick: 'showMainCategories()' }, { name: section.name, onclick: `showCategories('${sectionId}')` }, { name: category.name }]);
        }

        function updateBreadcrumb(path) {
            const breadcrumb = document.getElementById('breadcrumb'); if (!breadcrumb) return;
            breadcrumb.innerHTML = '<i class="fas fa-home" onclick="showMainCategories()"></i>';
            path.forEach((item, index) => {
                if (item.onclick) breadcrumb.innerHTML += `<span onclick="${item.onclick}">${item.name}</span>`;
                else breadcrumb.innerHTML += `<span>${item.name}</span>`;
                if (index < path.length - 1) breadcrumb.innerHTML += `<i class="fas fa-chevron-left"></i>`;
            });
        }

        function openPurchaseModal(productName, price) {
            currentPurchase = { productName, price };
            document.getElementById('purchaseDetails').innerHTML = `<p>المنتج: ${productName}</p><p>السعر: ${price} $</p>`;
            document.getElementById('purchaseModal').style.display = 'flex';
        }

        function confirmPurchase() {
            if (!currentPurchase) return;
            const playerId = document.getElementById('playerId')?.value;
            if (!playerId) { showToast('أدخل معرف اللعبة', 'error'); return; }
            let orders = JSON.parse(localStorage.getItem('orders')) || [];
            orders.push({ product: currentPurchase.productName, price: currentPurchase.price, playerId: playerId, date: new Date().toISOString(), status: 'pending' });
            localStorage.setItem('orders', JSON.stringify(orders));
            document.getElementById('cartBadge').textContent = orders.length;
            showToast('تم تأكيد الطلب');
            document.getElementById('purchaseModal').style.display = 'none';
            const message = `طلب جديد: ${currentPurchase.productName}\nالسعر: ${currentPurchase.price}$\nمعرف: ${playerId}`;
            window.open(`https://wa.me/9630982251929?text=${encodeURIComponent(message)}`, '_blank');
        }

        // ==================== نظام تسجيل الدخول ====================
        function showAuthModal() { document.getElementById('authModal').style.display = 'flex'; }
        function closeModal(modalId) { document.getElementById(modalId).style.display = 'none'; }
        function showRegister() { closeModal('authModal'); document.getElementById('registerModal').style.display = 'flex'; }

        function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            let users = JSON.parse(localStorage.getItem('users')) || [];
            if (users.length === 0) users.push({ name: 'المدير', email: ADMIN_EMAIL, password: 'admin123', isAdmin: true });
            const user = users.find(u => u.email === email && u.password === password);
            if (user) {
                currentUser = user; localStorage.setItem('currentUser', JSON.stringify(user)); closeModal('authModal'); updateUI(); showToast(`مرحباً ${user.name}`);
            } else showToast('بريد أو كلمة سر خطأ', 'error');
        }

        function register() {
            const name = document.getElementById('regName').value; const email = document.getElementById('regEmail').value; const password = document.getElementById('regPassword').value;
            if (!name || !email || !password) { showToast('املأ جميع الحقول', 'error'); return; }
            let users = JSON.parse(localStorage.getItem('users')) || [];
            if (users.find(u => u.email === email)) { showToast('البريد موجود مسبقاً', 'error'); return; }
            users.push({ name, email, password, isAdmin: email === ADMIN_EMAIL, createdAt: new Date().toISOString() });
            localStorage.setItem('users', JSON.stringify(users));
            showToast('تم التسجيل بنجاح'); closeModal('registerModal'); showAuthModal();
        }

        function logout() { currentUser = null; localStorage.removeItem('currentUser'); document.getElementById('adminPanel').style.display = 'none'; updateUI(); showToast('تم تسجيل الخروج'); }

        function updateUI() {
            const loginIcon = document.getElementById('loginIcon'); const userMenu = document.getElementById('userMenu'); const userName = document.getElementById('userName'); const adminLink = document.getElementById('adminLink');
            if (currentUser) {
                loginIcon.style.display = 'none'; userMenu.style.display = 'flex'; userName.textContent = currentUser.name;
                if (currentUser.email === ADMIN_EMAIL) adminLink.style.display = 'block'; else adminLink.style.display = 'none';
            } else { loginIcon.style.display = 'block'; userMenu.style.display = 'none'; }
        }

        // ==================== لوحة المدير ====================
        function showAdminPanel() { if (currentUser?.email === ADMIN_EMAIL) { document.getElementById('adminPanel').style.display = 'block'; loadAdminData(); } }
        function hideAdminPanel() { document.getElementById('adminPanel').style.display = 'none'; }

        function loadAdminData() {
            if (currentUser?.email !== ADMIN_EMAIL) return;
            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const charges = JSON.parse(localStorage.getItem('charges')) || [];

            // المنتجات
            let productsHtml = '<h3>إدارة المنتجات</h3>';
            storeData.sections.forEach(section => {
                productsHtml += `<h4>${section.name}</h4>`;
                section.categories.forEach(category => {
                    productsHtml += `<div><strong>${category.name}</strong><ul>`;
                    category.products.forEach(p => productsHtml += `<li>${p.name} - ${p.price}$</li>`);
                    productsHtml += `</ul></div>`;
                });
            });
            document.getElementById('adminProducts').innerHTML = productsHtml;

            // الطلبات
            let ordersHtml = '<h3>الطلبات</h3><table class="admin-table"><tr><th>المنتج</th><th>السعر</th><th>الحالة</th></tr>';
            orders.reverse().forEach(o => ordersHtml += `<tr><td>${o.product}</td><td>${o.price}$</td><td><span class="status-badge ${o.status}">${o.status}</span></td></tr>`);
            ordersHtml += '</table>';
            document.getElementById('adminOrders').innerHTML = ordersHtml;

            // الشحن
            let chargesHtml = '<h3>طلبات الشحن</h3><table class="admin-table"><tr><th>المستخدم</th><th>المبلغ</th><th>الحالة</th></tr>';
            charges.reverse().forEach(c => chargesHtml += `<tr><td>${c.userEmail}</td><td>${c.amount}$</td><td><span class="status-badge ${c.status}">${c.status}</span></td></tr>`);
            chargesHtml += '</table>';
            document.getElementById('adminCharges').innerHTML = chargesHtml;

            // الإحصائيات
            const totalSales = orders.reduce((sum, o) => sum + (o.price || 0), 0);
            document.getElementById('adminStats').innerHTML = `<h3>الإحصائيات</h3><div class="stats-grid"><div class="stat-card"><span class="stat-value">${orders.length}</span><span>إجمالي الطلبات</span></div><div class="stat-card"><span class="stat-value">${users.length}</span><span>العملاء</span></div><div class="stat-card"><span class="stat-value">${totalSales}$</span><span>إجمالي المبيعات</span></div></div>`;
        }

        function showAdminTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.admin-tab-content').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`admin${tabName.charAt(0).toUpperCase() + tabName.slice(1)}`).classList.add('active');
        }

        // ==================== نظام المحفظة ====================
        function showWallet() {
            if (!currentUser) { showToast('سجل دخول أولاً', 'error'); showAuthModal(); return; }
            if (!wallets[currentUser.email]) wallets[currentUser.email] = { balance: 0, transactions: [] };
            const wallet = wallets[currentUser.email];
            document.getElementById('walletBalance').textContent = wallet.balance + ' $';
            let transactionsHtml = '';
            wallet.transactions.slice(-5).reverse().forEach(t => transactionsHtml += `<div class="transaction"><span>${t.description}</span><span>${t.type === 'charge' ? '+' : '-'} ${Math.abs(t.amount)}$</span></div>`);
            document.getElementById('transactions').innerHTML = transactionsHtml || '<p>لا توجد حركات</p>';
            document.getElementById('walletModal').style.display = 'flex';
        }

        function chargeWallet(amount) {
            if (!currentUser) { showToast('سجل دخول أولاً', 'error'); return; }
            let charges = JSON.parse(localStorage.getItem('charges')) || [];
            charges.push({ userEmail: currentUser.email, amount: amount, date: new Date().toISOString(), status: 'pending' });
            localStorage.setItem('charges', JSON.stringify(charges));
            showToast('تم إرسال طلب الشحن'); closeModal('walletModal');
        }

        function showOrders() {
            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            const userOrders = currentUser ? orders.filter(o => o.userEmail === currentUser.email) : [];
            showToast(`عدد طلباتك: ${userOrders.length}`);
        }

        // ==================== دوال مساعدة ====================
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast'); if (!toast) return;
            toast.textContent = message; toast.className = `toast show ${type}`;
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ==================== تهيئة الصفحة ====================
        document.addEventListener('DOMContentLoaded', () => { showMainCategories(); updateUI(); });
    </script>
</body>
</html>
