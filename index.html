<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>ALZAK STORE | المتجر الرسمي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui, sans-serif; }
        body { background:#0a0a0a; color:#fff; transition:0.3s; }
        body.light-mode { background:#f5f5f5; color:#000; }

        .header {
            background:#000; padding:15px;
            display:flex; justify-content:space-between; align-items:center;
            border-bottom:3px solid #fbbf24;
        }
        .logo h1 {
            font-size:22px;
            background:linear-gradient(135deg,#fbbf24,#f59e0b);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        }
        .header-icons {
            display:flex; gap:15px; align-items:center;
        }
        .header-icons i {
            font-size:22px; cursor:pointer; color:#fbbf24;
        }
        .badge {
            position:absolute; top:-8px; right:-8px;
            background:#fbbf24; color:#000; border-radius:50%;
            padding:2px 6px; font-size:10px; font-weight:700;
        }

        .breadcrumb {
            padding:15px; display:flex; gap:10px;
            border-bottom:1px solid #333;
        }
        .breadcrumb i, .breadcrumb span { color:#fbbf24; cursor:pointer; }
        .breadcrumb span:last-child { color:#fff; cursor:default; }

        .main-categories {
            display:flex; flex-direction:column; gap:15px; padding:15px;
        }
        .section-card {
            height:150px; border-radius:20px; overflow:hidden; cursor:pointer;
            background-size:cover; background-position:center; position:relative;
        }
        .section-overlay {
            position:absolute; inset:0; background:rgba(0,0,0,0.5);
            display:flex; align-items:center; justify-content:center; gap:10px;
            font-size:24px;
        }
        .section-overlay i { color:#fbbf24; font-size:30px; }

        .category-card {
            height:100px; border-radius:15px; overflow:hidden; margin-bottom:15px;
            cursor:pointer; background-size:cover; background-position:center;
            position:relative;
        }
        .category-overlay {
            position:absolute; inset:0; background:rgba(0,0,0,0.4);
            display:flex; align-items:center; justify-content:center;
            font-size:20px;
        }

        .products-grid {
            display:grid; grid-template-columns:repeat(2,1fr); gap:15px; padding:15px;
        }
        .product-card {
            background:#1a1a1a; border:2px solid #333; border-radius:15px;
            padding:15px; text-align:center; cursor:pointer;
        }
        .product-card:hover { border-color:#fbbf24; }
        .price { color:#fbbf24; font-size:20px; font-weight:900; margin:10px 0; }
        .buy-btn {
            background:#fbbf24; color:#000; border:none; padding:10px;
            border-radius:30px; font-weight:700; width:100%; cursor:pointer;
        }

        .modal {
            display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95);
            align-items:center; justify-content:center; padding:15px; z-index:9999;
        }
        .modal-content {
            background:#111; border:2px solid #fbbf24; border-radius:25px;
            padding:25px; width:100%; max-width:400px;
        }
        .modal-content input, .modal-content select {
            width:100%; padding:12px; margin:10px 0;
            background:#333; border:1px solid #fbbf24; border-radius:10px;
            color:#fff; font-size:16px;
        }
        .modal-content button {
            width:100%; padding:12px; background:#fbbf24; color:#000;
            border:none; border-radius:30px; font-weight:700; margin:5px 0;
            cursor:pointer;
        }
        .close {
            float:left; font-size:24px; cursor:pointer; color:#fbbf24;
        }

        .toast {
            position:fixed; bottom:20px; left:15px; right:15px;
            background:#111; border:2px solid #fbbf24; padding:15px;
            border-radius:30px; text-align:center; transform:translateY(200%);
            transition:0.3s; z-index:10001;
        }
        .toast.show { transform:translateY(0); }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><h1>ALZAK STORE</h1></div>
        <div class="header-icons">
            <i class="fas fa-wallet" onclick="showWallet()"></i>
            <i class="fas fa-shopping-cart" onclick="showMyOrders()"><span class="badge" id="cartBadge">0</span></i>
            <i class="far fa-user-circle" onclick="showAuthModal()" id="loginIcon"></i>
        </div>
    </div>

    <div class="breadcrumb" id="breadcrumb"><i class="fas fa-home" onclick="showMain()"></i></div>
    <div id="mainCategories" class="main-categories"></div>
    <div id="subContent" class="sub-content"></div>

    <!-- النوافذ المنبثقة -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('authModal')">&times;</span>
            <h2 style="text-align:center;">تسجيل الدخول</h2>
            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="loginPassword" placeholder="كلمة المرور">
            <button onclick="loginWithEmail()">دخول</button>
            <p style="text-align:center; margin:10px 0;">أو</p>
            <button onclick="loginWithGoogle()" style="background:#fff; color:#000;">تسجيل بحساب Google</button>
            <p style="text-align:center; margin-top:15px;">ليس لديك حساب؟ <a href="#" onclick="showRegister()" style="color:#fbbf24;">سجل الآن</a></p>
        </div>
    </div>

    <div id="registerModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('registerModal')">&times;</span>
            <h2 style="text-align:center;">تسجيل جديد</h2>
            <input type="text" id="regName" placeholder="الاسم">
            <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="regPassword" placeholder="كلمة المرور">
            <button onclick="registerWithEmail()">تسجيل</button>
        </div>
    </div>

    <div id="purchaseModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('purchaseModal')">&times;</span>
            <h2 style="text-align:center;">تأكيد الشراء</h2>
            <div id="purchaseDetails" style="margin:15px 0;"></div>
            <input type="text" id="playerId" placeholder="معرف اللعبة">
            <button onclick="confirmPurchase()">تأكيد</button>
        </div>
    </div>

    <div id="walletModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('walletModal')">&times;</span>
            <h2 style="text-align:center;">محفظتي</h2>
            <div style="font-size:36px; color:#fbbf24; text-align:center; margin:20px 0;" id="walletBalance">0$</div>
            <h3>شحن الرصيد</h3>
            <select id="chargeAmount">
                <option value="5">5 $</option>
                <option value="10">10 $</option>
                <option value="20">20 $</option>
                <option value="50">50 $</option>
            </select>
            <button onclick="requestCharge()">طلب شحن</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCO_VTLgQkTOv_MkB0SEdSEYdRMi9IdMFA",
            authDomain: "alzak-store-dea53.firebaseapp.com",
            projectId: "alzak-store-dea53",
            storageBucket: "alzak-store-dea53.firebasestorage.app",
            messagingSenderId: "494547602038",
            appId: "1:494547602038:web:f9f78605414173ae63ed57"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const storeData = {
            sections: [
                { id:'games', name:'🎮 الألعاب', icon:'fa-gamepad', image:'https://i.ibb.co/vc4DVH2C/Screenshot-20260312-002402.png',
                  categories:[
                      { id:'pubg', name:'PUBG', image:'https://i.ibb.co/vc4DVH2C/Screenshot-20260312-002402.png',
                        products:[
                            { name:'60 UC', price:0.99 },
                            { name:'300 UC + 25', price:4.99 }
                        ] },
                      { id:'freefire', name:'Free Fire', image:'https://i.ibb.co/vc4DVH2C/Screenshot-20260312-002402.png',
                        products:[
                            { name:'100 جوهرة', price:1.50 },
                            { name:'341 جوهرة', price:3.99 }
                        ] }
                  ] },
                { id:'apps', name:'📱 التطبيقات', icon:'fa-mobile-alt', image:'https://i.ibb.co/dpjQfMPQ/Screenshot-20260312-001846.png',
                  categories:[
                      { id:'shahid', name:'شاهد VIP', image:'https://i.ibb.co/dpjQfMPQ/Screenshot-20260312-001846.png',
                        products:[
                            { name:'شهر واحد', price:5.99 },
                            { name:'3 شهور', price:15.99 }
                        ] },
                      { id:'netflix', name:'نتفلكس', image:'https://i.ibb.co/dpjQfMPQ/Screenshot-20260312-001846.png',
                        products:[
                            { name:'شهر واحد', price:7.99 },
                            { name:'3 شهور', price:21.99 }
                        ] }
                  ] },
                { id:'cards', name:'💳 بطاقات جوجل', icon:'fa-google', image:'https://i.ibb.co/qF95JZfM/Screenshot-20260312-002552.png',
                  categories:[
                      { id:'google', name:'بطاقات جوجل بلاي', image:'https://i.ibb.co/qF95JZfM/Screenshot-20260312-002552.png',
                        products:[
                            { name:'بطاقة 10$', price:10.00 },
                            { name:'بطاقة 25$', price:25.00 }
                        ] }
                  ] }
            ]
        };

        let currentUser = null;
        let currentPurchase = null;

        window.loginWithEmail = async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
                document.getElementById('authModal').style.display = 'none';
                showToast('✅ تم تسجيل الدخول');
            } catch (e) {
                showToast('❌ ' + e.message, 'error');
            }
        };

        window.loginWithGoogle = async () => {
            try {
                await signInWithPopup(auth, provider);
                document.getElementById('authModal').style.display = 'none';
                showToast('✅ تم تسجيل الدخول');
            } catch (e) {
                showToast('❌ ' + e.message, 'error');
            }
        };

        window.registerWithEmail = async () => {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            try {
                const cred = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(cred.user, { displayName: name });
                showToast('✅ تم إنشاء الحساب');
                document.getElementById('registerModal').style.display = 'none';
            } catch (e) {
                showToast('❌ ' + e.message, 'error');
            }
        };

        window.logout = async () => {
            await signOut(auth);
            showToast('✅ تم تسجيل الخروج');
        };

        onAuthStateChanged(auth, user => {
            if (user) {
                currentUser = {
                    uid: user.uid,
                    email: user.email,
                    name: user.displayName || user.email.split('@')[0]
                };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                updateUI();
            } else {
                currentUser = null;
                localStorage.removeItem('currentUser');
                updateUI();
            }
        });

        function updateUI() {
            const loginIcon = document.getElementById('loginIcon');
            if (currentUser) loginIcon.style.display = 'none';
            else loginIcon.style.display = 'block';
        }

        window.showMain = () => {
            const container = document.getElementById('mainCategories');
            container.innerHTML = '';
            storeData.sections.forEach(s => {
                container.innerHTML += `
                    <div class="section-card" style="background-image:url('${s.image}')" onclick="showCategories('${s.id}')">
                        <div class="section-overlay"><i class="fas ${s.icon}"></i><h3>${s.name}</h3></div>
                    </div>
                `;
            });
            document.getElementById('subContent').innerHTML = '';
            document.getElementById('breadcrumb').innerHTML = '<i class="fas fa-home" onclick="showMain()"></i>';
        };

        window.showCategories = (sectionId) => {
            const section = storeData.sections.find(s => s.id === sectionId);
            const container = document.getElementById('subContent');
            container.innerHTML = `<div class="breadcrumb" style="margin-bottom:15px;"><span onclick="showMain()">🔙 رجوع</span></div>`;
            section.categories.forEach(c => {
                container.innerHTML += `
                    <div class="category-card" style="background-image:url('${c.image}')" onclick="showProducts('${section.id}','${c.id}')">
                        <div class="category-overlay"><h4>${c.name}</h4></div>
                    </div>
                `;
            });
        };

        window.showProducts = (sectionId, categoryId) => {
            const section = storeData.sections.find(s => s.id === sectionId);
            const category = section.categories.find(c => c.id === categoryId);
            const container = document.getElementById('subContent');
            let html = `<div class="breadcrumb" style="margin-bottom:15px;"><span onclick="showCategories('${sectionId}')">🔙 رجوع</span></div><div class="products-grid">`;
            category.products.forEach(p => {
                html += `
                    <div class="product-card" onclick="openPurchaseModal('${p.name}',${p.price})">
                        <h4>${p.name}</h4>
                        <p class="price">${p.price}$</p>
                        <button class="buy-btn">اشتري</button>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        };

        window.openPurchaseModal = (name, price) => {
            if (!currentUser) {
                showToast('سجل دخول أولاً', 'error');
                showAuthModal();
                return;
            }
            currentPurchase = { name, price };
            document.getElementById('purchaseDetails').innerHTML = `<p>المنتج: ${name}</p><p>السعر: ${price}$</p>`;
            document.getElementById('purchaseModal').style.display = 'flex';
        };

        window.confirmPurchase = () => {
            const pid = document.getElementById('playerId').value;
            if (!pid) { showToast('أدخل المعرف', 'error'); return; }
            showToast('✅ تم تأكيد الطلب');
            document.getElementById('purchaseModal').style.display = 'none';
        };

        window.showWallet = () => {
            if (!currentUser) { showToast('سجل دخول أولاً', 'error'); showAuthModal(); return; }
            document.getElementById('walletModal').style.display = 'flex';
        };

        window.requestCharge = () => {
            showToast('✅ تم إرسال طلب الشحن');
            document.getElementById('walletModal').style.display = 'none';
        };

        window.showMyOrders = () => showToast('طلباتك قريباً');
        window.showAuthModal = () => document.getElementById('authModal').style.display = 'flex';
        window.showRegister = () => { closeModal('authModal'); document.getElementById('registerModal').style.display = 'flex'; };
        window.closeModal = (id) => document.getElementById(id).style.display = 'none';
        window.showToast = (msg, type='success') => {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        };

        showMain();
        updateUI();
    </script>
</body>
</html>
