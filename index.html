<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALZAK STORE | متجر الشحن الرسمي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- مؤشر التحميل -->
    <div id="loading"><i class="fas fa-spinner fa-spin"></i><p>جاري التحميل...</p></div>

    <!-- الهيدر -->
    <div class="header">
        <div class="logo">
            <h1>ALZAK STORE</h1>
            <span>المتجر الرسمي</span>
        </div>
        <div class="icons">
            <i class="far fa-heart" onclick="showToast('المفضلة قريباً')"></i>
            <i class="fas fa-wallet" onclick="showWallet()"></i>
            <i class="fas fa-shopping-cart" onclick="showOrders()">
                <span class="badge" id="cartBadge">0</span>
            </i>
            <div id="userSection">
                <i class="fas fa-user" onclick="showAuthModal()" id="loginIcon"></i>
                <div id="userMenu" style="display: none;">
                    <img id="userAvatar" src="" alt="">
                    <span id="userName"></span>
                    <div class="dropdown">
                        <a href="#" onclick="showWallet()">محفظتي</a>
                        <a href="#" onclick="showOrders()">طلباتي</a>
                        <a href="#" id="adminLink" style="display: none;" onclick="showAdminPanel()">لوحة المدير</a>
                        <a href="#" onclick="logout()">تسجيل خروج</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- مسار التنقل -->
    <div class="breadcrumb" id="breadcrumb">
        <i class="fas fa-home" onclick="showMainCategories()"></i>
    </div>

    <!-- الأقسام الرئيسية -->
    <div id="mainCategories" class="main-categories"></div>

    <!-- الفئات الفرعية والمنتجات -->
    <div id="subContent" class="sub-content"></div>

    <!-- لوحة المدير -->
    <div id="adminPanel" class="admin-panel" style="display: none;">
        <div class="admin-header">
            <h2><i class="fas fa-crown"></i> لوحة التحكم</h2>
            <button onclick="hideAdminPanel()"><i class="fas fa-times"></i></button>
        </div>
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="showAdminTab('products')">المنتجات</button>
            <button class="tab-btn" onclick="showAdminTab('orders')">الطلبات</button>
            <button class="tab-btn" onclick="showAdminTab('charges')">طلبات الشحن</button>
            <button class="tab-btn" onclick="showAdminTab('users')">العملاء</button>
            <button class="tab-btn" onclick="showAdminTab('stats')">الإحصائيات</button>
        </div>
        <div id="adminProducts" class="admin-tab-content active"></div>
        <div id="adminOrders" class="admin-tab-content"></div>
        <div id="adminCharges" class="admin-tab-content"></div>
        <div id="adminUsers" class="admin-tab-content"></div>
        <div id="adminStats" class="admin-tab-content"></div>
    </div>

    <!-- النوافذ المنبثقة -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('authModal')">&times;</span>
            <h2>تسجيل الدخول</h2>
            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="loginPassword" placeholder="كلمة المرور">
            <button onclick="login()">دخول</button>
            <p>ليس لديك حساب؟ <a href="#" onclick="showRegister()">سجل الآن</a></p>
        </div>
    </div>

    <div id="registerModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('registerModal')">&times;</span>
            <h2>تسجيل جديد</h2>
            <input type="text" id="regName" placeholder="الاسم">
            <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="regPassword" placeholder="كلمة المرور">
            <button onclick="register()">تسجيل</button>
        </div>
    </div>

    <div id="walletModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('walletModal')">&times;</span>
            <h2>محفظتي</h2>
            <div class="wallet-balance" id="walletBalance">0 $</div>
            <h3>شحن الرصيد</h3>
            <div class="charge-options">
                <button onclick="chargeWallet(5)">5 $</button>
                <button onclick="chargeWallet(10)">10 $</button>
                <button onclick="chargeWallet(20)">20 $</button>
                <button onclick="chargeWallet(50)">50 $</button>
            </div>
            <h3>آخر الحركات</h3>
            <div id="transactions"></div>
        </div>
    </div>

    <div id="purchaseModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('purchaseModal')">&times;</span>
            <h2>تأكيد الشراء</h2>
            <div id="purchaseDetails"></div>
            <input type="text" id="playerId" placeholder="معرف اللعبة / الحساب">
            <button onclick="confirmPurchase()">تأكيد الشراء</button>
        </div>
    </div>

    <!-- الإشعارات -->
    <div id="toast" class="toast"></div>

    <!-- ملفات JavaScript -->
    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/categories.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/wallet.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
