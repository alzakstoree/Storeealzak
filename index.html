<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>ALZAK STORE | مدير المتجر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { background: #0a0a0a; color: #fff; padding: 15px; }
        
        /* الهيدر */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #fbbf24; }
        .logo h1 { font-size: 24px; background: linear-gradient(135deg, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .icons { display: flex; gap: 20px; align-items: center; }
        .icons i { font-size: 22px; cursor: pointer; }
        #userMenu { display: flex; align-items: center; gap: 10px; cursor: pointer; background: #1a1a1a; padding: 5px 15px; border-radius: 30px; }
        
        /* لوحة المدير - تصميم كامل للجوال */
        .admin-panel { background: #111; border: 2px solid #fbbf24; border-radius: 25px; padding: 20px; margin-top: 20px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .admin-tabs { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 20px; }
        .tab-btn { flex: 1; min-width: 80px; background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 12px 5px; border-radius: 30px; font-size: 13px; cursor: pointer; }
        .tab-btn.active { background: #fbbf24; color: #000; font-weight: 700; }
        .admin-tab-content { display: none; }
        .admin-tab-content.active { display: block; }
        
        /* كروت المنتجات */
        .product-card { background: #1a1a1a; border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .product-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .product-row input { flex: 1; background: #333; border: 1px solid #fbbf24; border-radius: 10px; padding: 12px; color: #fff; font-size: 16px; }
        .product-actions { display: flex; gap: 5px; }
        .product-actions button { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; }
        .save-btn { background: #22c55e; color: #fff; }
        .delete-btn { background: #ef4444; color: #fff; }
        .add-btn { width: 100%; background: #fbbf24; color: #000; border: none; border-radius: 10px; padding: 15px; font-weight: 700; font-size: 16px; margin-top: 10px; cursor: pointer; }
        
        /* الطلبات */
        .order-card { background: #1a1a1a; border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .order-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .order-status { display: flex; gap: 10px; margin: 10px 0; }
        .order-status select { flex: 2; background: #333; color: #fff; border: 1px solid #fbbf24; border-radius: 10px; padding: 12px; font-size: 14px; }
        .order-status button { flex: 0 0 50px; background: #ef4444; border: none; border-radius: 10px; color: #fff; font-size: 20px; cursor: pointer; }
        
        /* الإحصائيات */
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .stat-card { background: #1a1a1a; border-radius: 15px; padding: 20px; text-align: center; }
        .stat-value { font-size: 32px; color: #fbbf24; font-weight: 900; }
        
        /* النوافذ المنبثقة */
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; padding: 20px; z-index: 9999; }
        .modal-content { background: #111; border: 2px solid #fbbf24; border-radius: 25px; padding: 25px; width: 100%; max-width: 400px; }
        .modal-content input { width: 100%; background: #333; border: 1px solid #fbbf24; border-radius: 10px; padding: 15px; margin: 10px 0; color: #fff; font-size: 16px; }
        .modal-content button { width: 100%; background: #fbbf24; color: #000; border: none; border-radius: 10px; padding: 15px; font-weight: 700; font-size: 16px; margin: 5px 0; cursor: pointer; }
        .close { position: absolute; top: 20px; left: 25px; font-size: 28px; color: #fbbf24; cursor: pointer; }
        
        .toast { position: fixed; bottom: 20px; left: 15px; right: 15px; background: #111; border: 2px solid #fbbf24; padding: 15px; border-radius: 30px; text-align: center; transform: translateY(200%); transition: 0.3s; z-index: 10000; }
        .toast.show { transform: translateY(0); }
    </style>
</head>
<body>
    <!-- الهيدر -->
    <div class="header">
        <div class="logo"><h1>ALZAK STORE</h1></div>
        <div class="icons">
            <i class="fas fa-wallet" onclick="showWallet()"></i>
            <div id="userMenu" style="display:none" onclick="toggleUserMenu()">
                <span id="userName"></span>
                <i class="fas fa-chevron-down"></i>
                <div id="adminLink" style="display:none; position:absolute; top:60px; left:10px; background:#1a1a1a; border:2px solid #fbbf24; border-radius:15px; padding:10px;">
                    <a href="#" onclick="showAdminPanel()" style="color:#fff; text-decoration:none;">🔧 لوحة المدير</a>
                </div>
            </div>
            <i class="fas fa-user" id="loginIcon" onclick="showAuthModal()"></i>
        </div>
    </div>

    <!-- لوحة المدير -->
    <div id="adminPanel" class="admin-panel" style="display:none;">
        <div class="admin-header">
            <h2 style="color:#fbbf24;">🔧 لوحة التحكم</h2>
            <i class="fas fa-times" onclick="hideAdminPanel()" style="font-size:24px; cursor:pointer;"></i>
        </div>
        
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="showTab('products')">المنتجات</button>
            <button class="tab-btn" onclick="showTab('orders')">الطلبات</button>
            <button class="tab-btn" onclick="showTab('charges')">الشحن</button>
            <button class="tab-btn" onclick="showTab('stats')">الإحصائيات</button>
        </div>

        <div id="tabProducts" class="admin-tab-content active"></div>
        <div id="tabOrders" class="admin-tab-content"></div>
        <div id="tabCharges" class="admin-tab-content"></div>
        <div id="tabStats" class="admin-tab-content"></div>
    </div>

    <!-- باقي المحتوى (يظهر للزبائن) -->
    <div id="storeContent"></div>

    <!-- النوافذ المنبثقة -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('authModal')">&times;</span>
            <h2 style="color:#fbbf24; text-align:center;">تسجيل الدخول</h2>
            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" value="alolao45y@gmail.com">
            <input type="password" id="loginPassword" placeholder="كلمة المرور" value="admin123">
            <button onclick="login()">دخول</button>
        </div>
    </div>

    <div id="walletModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('walletModal')">&times;</span>
            <h2 style="color:#fbbf24;">محفظتي</h2>
            <div style="font-size:36px; color:#fbbf24; text-align:center; margin:20px 0;" id="walletBalance">0$</div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // ==================== البيانات ====================
        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
        const ADMIN_EMAIL = 'alolao45y@gmail.com';
        
        // بيانات المتجر
        let storeData = JSON.parse(localStorage.getItem('storeData')) || {
            sections: [
                { name: 'الألعاب', categories: [
                    { name: 'PUBG', products: [
                        { name: '60 UC', price: 0.99 },
                        { name: '300 UC', price: 4.99 }
                    ]}
                ]}
            ]
        };

        // ==================== دوال تسجيل الدخول ====================
        function showAuthModal() { document.getElementById('authModal').style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (email === ADMIN_EMAIL && password === 'admin123') {
                currentUser = { email: ADMIN_EMAIL, name: 'المدير' };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                closeModal('authModal');
                updateUI();
                showToast('مرحباً المدير');
            } else {
                showToast('بيانات خطأ', 'error');
            }
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            document.getElementById('adminPanel').style.display = 'none';
            updateUI();
        }

        function updateUI() {
            if (currentUser) {
                document.getElementById('loginIcon').style.display = 'none';
                document.getElementById('userMenu').style.display = 'flex';
                document.getElementById('userName').textContent = 'المدير';
                if (currentUser.email === ADMIN_EMAIL) {
                    document.getElementById('adminLink').style.display = 'block';
                }
            } else {
                document.getElementById('loginIcon').style.display = 'block';
                document.getElementById('userMenu').style.display = 'none';
            }
        }

        // ==================== لوحة المدير ====================
        function showAdminPanel() {
            document.getElementById('adminPanel').style.display = 'block';
            loadProductsTab();
        }

        function hideAdminPanel() {
            document.getElementById('adminPanel').style.display = 'none';
        }

        function showTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.admin-tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab' + tabName.charAt(0).toUpperCase() + tabName.slice(1)).classList.add('active');
            
            if (tabName === 'products') loadProductsTab();
            if (tabName === 'orders') loadOrdersTab();
            if (tabName === 'stats') loadStatsTab();
        }

        // تبويب المنتجات
        function loadProductsTab() {
            let html = '';
            storeData.sections.forEach((section, s) => {
                section.categories.forEach((category, c) => {
                    html += `<div style="background:#1a1a1a; border-radius:15px; padding:15px; margin-bottom:20px;">`;
                    html += `<h3 style="color:#fbbf24; margin-bottom:15px;">${category.name}</h3>`;
                    
                    category.products.forEach((product, p) => {
                        html += `
                            <div class="product-card">
                                <div class="product-row">
                                    <input type="text" id="name_${s}_${c}_${p}" value="${product.name}">
                                    <input type="number" id="price_${s}_${c}_${p}" value="${product.price}" step="0.01">
                                </div>
                                <div class="product-actions">
                                    <button class="save-btn" onclick="updateProduct(${s},${c},${p})">💾 حفظ</button>
                                    <button class="delete-btn" onclick="deleteProduct(${s},${c},${p})">🗑️ حذف</button>
                                </div>
                            </div>
                        `;
                    });
                    
                    html += `
                        <div style="margin-top:15px;">
                            <input type="text" id="new_name_${s}_${c}" placeholder="اسم المنتج الجديد" style="width:100%; background:#333; border:1px solid #fbbf24; border-radius:10px; padding:12px; margin-bottom:10px; color:#fff;">
                            <input type="number" id="new_price_${s}_${c}" placeholder="السعر" step="0.01" style="width:100%; background:#333; border:1px solid #fbbf24; border-radius:10px; padding:12px; margin-bottom:10px; color:#fff;">
                            <button class="add-btn" onclick="addProduct(${s},${c})">➕ إضافة منتج</button>
                        </div>
                    `;
                    html += `</div>`;
                });
            });
            document.getElementById('tabProducts').innerHTML = html;
        }

        window.updateProduct = function(s, c, p) {
            const name = document.getElementById(`name_${s}_${c}_${p}`).value;
            const price = parseFloat(document.getElementById(`price_${s}_${c}_${p}`).value);
            if (!name || isNaN(price)) return showToast('بيانات غير صحيحة', 'error');
            
            storeData.sections[s].categories[c].products[p].name = name;
            storeData.sections[s].categories[c].products[p].price = price;
            localStorage.setItem('storeData', JSON.stringify(storeData));
            showToast('✅ تم التعديل');
        };

        window.deleteProduct = function(s, c, p) {
            if (!confirm('حذف؟')) return;
            storeData.sections[s].categories[c].products.splice(p, 1);
            localStorage.setItem('storeData', JSON.stringify(storeData));
            loadProductsTab();
            showToast('✅ تم الحذف');
        };

        window.addProduct = function(s, c) {
            const name = document.getElementById(`new_name_${s}_${c}`).value;
            const price = parseFloat(document.getElementById(`new_price_${s}_${c}`).value);
            if (!name || isNaN(price)) return showToast('بيانات غير صحيحة', 'error');
            
            storeData.sections[s].categories[c].products.push({ name, price });
            localStorage.setItem('storeData', JSON.stringify(storeData));
            document.getElementById(`new_name_${s}_${c}`).value = '';
            document.getElementById(`new_price_${s}_${c}`).value = '';
            loadProductsTab();
            showToast('✅ تمت الإضافة');
        };

        // تبويب الطلبات
        function loadOrdersTab() {
            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            let html = '';
            orders.reverse().forEach((order, i) => {
                html += `
                    <div class="order-card">
                        <div class="order-header">
                            <span>${order.product || 'منتج'}</span>
                            <span style="color:#fbbf24;">${order.price || 0}$</span>
                        </div>
                        <div class="order-status">
                            <select id="order_status_${i}">
                                <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>⏳ قيد الانتظار</option>
                                <option value="completed" ${order.status === 'completed' ? 'selected' : ''}>✅ مكتمل</option>
                            </select>
                            <button onclick="deleteOrder(${i})">🗑️</button>
                        </div>
                        <button onclick="updateOrderStatus(${i})" style="width:100%; background:#fbbf24; color:#000; border:none; border-radius:10px; padding:12px; font-weight:700;">تحديث الحالة</button>
                    </div>
                `;
            });
            document.getElementById('tabOrders').innerHTML = html || '<p style="text-align:center;">لا توجد طلبات</p>';
        }

        window.updateOrderStatus = function(i) {
            const select = document.getElementById(`order_status_${i}`);
            if (!select) return;
            let orders = JSON.parse(localStorage.getItem('orders')) || [];
            orders[i].status = select.value;
            localStorage.setItem('orders', JSON.stringify(orders));
            showToast('✅ تم التحديث');
        };

        window.deleteOrder = function(i) {
            if (!confirm('حذف الطلب؟')) return;
            let orders = JSON.parse(localStorage.getItem('orders')) || [];
            orders.splice(i, 1);
            localStorage.setItem('orders', JSON.stringify(orders));
            loadOrdersTab();
            showToast('✅ تم الحذف');
        };

        // تبويب الإحصائيات
        function loadStatsTab() {
            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            const total = orders.reduce((s, o) => s + (o.price || 0), 0);
            document.getElementById('tabStats').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card"><span class="stat-value">${orders.length}</span><span>الطلبات</span></div>
                    <div class="stat-card"><span class="stat-value">${total}$</span><span>المبيعات</span></div>
                </div>
            `;
        }

        // دوال مساعدة
        function showToast(m, t = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = m;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function showWallet() {
            showToast('المحفظة قريباً');
        }

        function toggleUserMenu() {
            const link = document.getElementById('adminLink');
            link.style.display = link.style.display === 'none' ? 'block' : 'none';
        }

        // تهيئة الصفحة
        updateUI();
    </script>
</body>
</html>
