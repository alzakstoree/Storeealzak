<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>ALZAK STORE | المتجر الرسمي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- الهيدر -->
    <div class="header">
        <div class="header-left">
            <i class="fas fa-bars" onclick="toggleSideMenu()"></i>
        </div>
        <div class="logo">
            <h1>ALZAK STORE</h1>
        </div>
        <div class="header-right">
            <span class="wallet-mini" id="walletMini">0$</span>
            <i class="fas fa-plus-circle" onclick="showDepositModal()" style="color: #fbbf24; font-size: 24px;"></i>
            <!-- أيقونة المستخدم -->
            <div class="profile-icon" onclick="showAuthModal()" id="loginIcon"></div>
            <!-- القائمة المنسدلة اليمنى (بعد تسجيل الدخول) -->
            <div id="userMenu" style="display: none;">
                <span id="userName"></span>
                <i class="fas fa-chevron-down"></i>
                <div class="dropdown" id="userDropdown">
                    <!-- معلومات المستخدم -->
                    <div class="dropdown-user-info">
                        <div class="dropdown-name" id="dropdownUserName"></div>
                        <div class="dropdown-email" id="dropdownUserEmail"></div>
                    </div>
                    <div class="dropdown-divider"></div>
                    <!-- روابط -->
                    <a href="#" id="adminLink" style="display: none;" onclick="showAdminPanel()">🔧 لوحة المدير</a>
                    <a href="#" onclick="logout()">🚪 تسجيل خروج</a>
                </div>
            </div>
        </div>
    </div>

    <!-- القائمة الجانبية (☰) -->
    <div id="sideMenu" class="side-menu">
        <div class="menu-header">
            <i class="fas fa-times" onclick="toggleSideMenu()"></i>
            <h3>القائمة</h3>
        </div>
        
        <!-- الملف الشخصي (يظهر فقط للمستخدمين المسجلين) -->
        <div class="menu-profile" id="menuProfile" style="display: none;">
            <div class="profile-name" id="menuProfileName"></div>
            <div class="profile-email" id="menuProfileEmail"></div>
        </div>
        
        <!-- روابط عامة -->
        <div class="menu-section">
            <div class="menu-section-title">المتجر</div>
            <ul class="menu-items">
                <li><a href="#" onclick="showMainCategories(); toggleSideMenu()"><i class="fas fa-home"></i> الرئيسية</a></li>
                <li><a href="#" onclick="toggleTheme(); toggleSideMenu()"><i class="fas fa-sun"></i> الوضع الفاتح</a></li>
            </ul>
        </div>
        
        <div class="menu-footer">
            <p>ALZAK STORE<br>©2025</p>
        </div>
    </div>

    <!-- البانر -->
    <div class="banner">
        <img src="https://i.ibb.co/svNY3gdM/Screenshot-20260307-020853.jpg" alt="ALZAK Banner">
    </div>

    <!-- السلايدر (صور فقط) -->
    <div class="slider-container">
        <div class="slider">
            <!-- الشريحة 1: صورة PUBG -->
            <div class="slide" style="background-image: url('https://i.ibb.co/5CxJNZG/Screenshot-20260312-222843.jpg');"></div>
            
            <!-- الشريحة 2: الصورة الجديدة الأولى -->
            <div class="slide" style="background-image: url('https://i.ibb.co/LdhFKbQ9/file-00000000c8c072469370cc5fb4ec4d15.png');"></div>
            
            <!-- الشريحة 3: الصورة الجديدة الثانية -->
            <div class="slide" style="background-image: url('https://i.ibb.co/svXRd7Rc/file-00000000872c720887125c86dc5f4954-1.png');"></div>
        </div>
        <button class="slider-prev">❮</button>
        <button class="slider-next">❯</button>
        <div class="slider-dots"></div>
    </div>

    <div class="breadcrumb" id="breadcrumb">
        <i class="fas fa-home" onclick="showMainCategories()"></i>
    </div>

    <!-- الأقسام الرئيسية (3 مربعات) -->
    <div id="mainCategories" class="main-categories"></div>

    <!-- محتوى الفئات والمنتجات (يظهر عند الضغط) -->
    <div id="subContent" class="sub-content" style="display: none;"></div>

    <!-- لوحة المدير -->
    <div id="adminPanel" class="admin-panel">
        <div class="admin-header">
            <h2><i class="fas fa-crown"></i> لوحة التحكم</h2>
            <button onclick="hideAdminPanel()"><i class="fas fa-times"></i></button>
        </div>
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="showAdminTab('products')">المنتجات</button>
            <button class="tab-btn" onclick="showAdminTab('orders')">الطلبات</button>
            <button class="tab-btn" onclick="showAdminTab('charges')">طلبات الشحن</button>
            <button class="tab-btn" onclick="showAdminTab('users')">العملاء</button>
            <button class="tab-btn" onclick="showAdminTab('stats')">الإحصائيات</button>
        </div>
        <div id="adminProducts" class="admin-tab-content active"></div>
        <div id="adminOrders" class="admin-tab-content"></div>
        <div id="adminCharges" class="admin-tab-content"></div>
        <div id="adminUsers" class="admin-tab-content"></div>
        <div id="adminStats" class="admin-tab-content"></div>
    </div>

    <!-- النوافذ المنبثقة -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('authModal')">&times;</span>
            <h2 style="text-align: center;">تسجيل الدخول</h2>
            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="loginPassword" placeholder="كلمة المرور">
            <button onclick="loginWithEmail()">دخول</button>
            <p style="text-align: center; margin: 10px 0;">أو</p>
            <button onclick="loginWithGoogle()" style="background: #fff; color: #000;">تسجيل بحساب Google</button>
            <p style="text-align: center; margin-top: 15px;">ليس لديك حساب؟ <a href="#" onclick="showRegisterModal()" style="color: #fbbf24;">سجل الآن</a></p>
        </div>
    </div>

    <div id="registerModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('registerModal')">&times;</span>
            <h2 style="text-align: center;">تسجيل جديد</h2>
            <input type="text" id="regName" placeholder="الاسم">
            <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="regPassword" placeholder="كلمة المرور">
            <button onclick="registerWithEmail()">تسجيل</button>
        </div>
    </div>

    <div id="purchaseModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('purchaseModal')">&times;</span>
            <h2 style="text-align: center;">تأكيد الشراء</h2>
            <div id="purchaseDetails" style="margin: 15px 0;"></div>
            <input type="text" id="playerId" placeholder="معرف اللعبة / الحساب">
            <button onclick="confirmPurchase()">تأكيد الشراء</button>
        </div>
    </div>

    <!-- نافذة المحفظة -->
    <div id="walletModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('walletModal')">&times;</span>
            <h2 style="text-align: center;">محفظتي</h2>
            <div style="font-size: 36px; color: #fbbf24; text-align: center; margin: 20px 0;" id="walletBalance">0$</div>
            
            <!-- زر الإيداع الجديد -->
            <button onclick="showDepositModal()" style="width: 100%; background: #fbbf24; color: #000; border: none; padding: 15px; border-radius: 30px; font-weight: 700; margin-bottom: 20px;">💰 إيداع رصيد جديد</button>
            
            <h3 style="margin-top: 20px;">آخر الحركات</h3>
            <div id="walletTransactions"></div>
        </div>
    </div>

    <div id="ordersModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('ordersModal')">&times;</span>
            <h2 style="text-align: center;">طلباتي</h2>
            <div id="ordersList"></div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- نافذة الإيداع الجديدة (تظهر ديناميكياً) -->
    <div id="depositModal" class="modal">
        <!-- المحتوى يتم إنشاؤه عبر JavaScript -->
    </div>

    <!-- القائمة السفلية -->
    <nav class="bottom-nav">
        <div class="nav-item" onclick="showWallet()">
            <i class="fas fa-wallet"></i>
            <span>محفظتي</span>
        </div>
        <div class="nav-item active" onclick="showMainCategories()">
            <i class="fas fa-home"></i>
            <span>الرئيسية</span>
        </div>
        <div class="nav-item" onclick="showDepositModal()">
            <i class="fas fa-dollar-sign"></i>
            <span>تعبئة رصيد</span>
        </div>
        <div class="nav-item" onclick="showMyOrders()">
            <i class="fas fa-shopping-cart"></i>
            <span>السلة</span>
        </div>
    </nav>

    <!-- ملفات JavaScript -->
    <script src="js/firebase-config.js" type="module"></script>
    <script src="js/store-data.js"></script>
    <script src="js/auth.js" type="module"></script>
    <script src="js/wallet.js" type="module"></script>
    <script src="js/admin.js" type="module"></script>
    <script src="js/main.js" type="module"></script>
</body>
</html>
