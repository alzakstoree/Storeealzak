<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>ALZAK STORE | المتجر الرسمي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #fff;
            transition: background 0.3s;
        }

        body.light-mode {
            background: #f5f5f5;
            color: #000;
        }

        .header {
            background: #000;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #fbbf24;
            position: relative;
        }

        .logo h1 {
            font-size: 22px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo span {
            font-size: 11px;
            color: #fbbf24;
            display: block;
        }

        .header-icons {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .header-icons i {
            font-size: 22px;
            cursor: pointer;
            color: #fbbf24;
        }

        .side-menu {
            position: fixed;
            top: 0;
            right: -280px;
            width: 260px;
            height: 100vh;
            background: #111;
            border-left: 2px solid #fbbf24;
            transition: 0.3s;
            z-index: 10000;
            padding: 20px;
            overflow-y: auto;
        }

        .side-menu.show {
            right: 0;
        }

        .menu-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            color: #fbbf24;
        }

        .menu-header i {
            font-size: 24px;
            cursor: pointer;
        }

        .menu-items {
            list-style: none;
        }

        .menu-items li {
            margin-bottom: 20px;
        }

        .menu-items a {
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-radius: 10px;
        }

        .menu-items a:hover {
            background: #fbbf24;
            color: #000;
        }

        .menu-footer {
            margin-top: 40px;
            text-align: center;
            color: #666;
            font-size: 12px;
        }

        .badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #fbbf24;
            color: #000;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 10px;
            font-weight: 700;
        }

        .breadcrumb {
            padding: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-bottom: 1px solid #333;
            flex-wrap: wrap;
        }

        .breadcrumb i {
            color: #fbbf24;
            cursor: pointer;
        }

        .breadcrumb span {
            cursor: pointer;
            color: #fbbf24;
        }

        .breadcrumb span:last-child {
            color: #fff;
            cursor: default;
        }

        .main-categories {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 15px;
        }

        .section-card {
            width: 100%;
            height: 150px;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .section-image {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
        }

        .section-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 24px;
        }

        .section-overlay i {
            color: #fbbf24;
            font-size: 30px;
        }

        .category-card {
            width: 100%;
            height: 100px;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .category-image {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .category-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 15px;
        }

        .product-card {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .product-card:hover {
            border-color: #fbbf24;
        }

        .product-card .price {
            color: #fbbf24;
            font-size: 20px;
            font-weight: 900;
            margin: 10px 0;
        }

        .buy-btn {
            background: #fbbf24;
            color: #000;
            border: none;
            padding: 10px;
            border-radius: 30px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
        }

        .admin-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 95%;
            height: 85vh;
            background: #111;
            border: 3px solid #fbbf24;
            border-radius: 25px;
            padding: 15px;
            z-index: 10000;
            overflow-y: auto;
            display: none;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .admin-header h2 {
            color: #fbbf24;
        }

        .admin-header button {
            background: none;
            border: none;
            color: #fbbf24;
            font-size: 24px;
            cursor: pointer;
        }

        .admin-tabs {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .tab-btn {
            flex: 1;
            min-width: 70px;
            background: #1a1a1a;
            color: #fff;
            border: 1px solid #333;
            padding: 12px 5px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
        }

        .tab-btn.active {
            background: #fbbf24;
            color: #000;
            font-weight: 700;
        }

        .admin-tab-content {
            display: none;
        }

        .admin-tab-content.active {
            display: block;
        }

        .product-edit-card {
            background: #1a1a1a;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .product-edit-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .product-edit-row input {
            flex: 1;
            background: #333;
            border: 1px solid #fbbf24;
            border-radius: 10px;
            padding: 12px;
            color: #fff;
            font-size: 16px;
        }

        .product-edit-actions {
            display: flex;
            gap: 5px;
        }

        .product-edit-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
        }

        .save-btn {
            background: #22c55e;
            color: #fff;
        }

        .delete-btn {
            background: #ef4444;
            color: #fff;
        }

        .add-btn {
            width: 100%;
            background: #fbbf24;
            color: #000;
            border: none;
            border-radius: 10px;
            padding: 15px;
            font-weight: 700;
            margin-top: 10px;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            align-items: center;
            justify-content: center;
            padding: 15px;
            z-index: 9999;
        }

        .modal-content {
            background: #111;
            border: 2px solid #fbbf24;
            border-radius: 25px;
            padding: 25px;
            width: 100%;
            max-width: 400px;
        }

        .modal-content input,
        .modal-content select {
            width: 100%;
            background: #333;
            border: 1px solid #fbbf24;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            color: #fff;
            font-size: 16px;
        }

        .modal-content button {
            width: 100%;
            background: #fbbf24;
            color: #000;
            border: none;
            border-radius: 10px;
            padding: 15px;
            font-weight: 700;
            margin: 5px 0;
            cursor: pointer;
        }

        .close {
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 28px;
            color: #fbbf24;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 15px;
            right: 15px;
            background: #111;
            border: 2px solid #fbbf24;
            padding: 15px;
            border-radius: 30px;
            text-align: center;
            transform: translateY(200%);
            transition: 0.3s;
            z-index: 10001;
        }

        .toast.show {
            transform: translateY(0);
        }

        @media (max-width: 480px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <h1>ALZAK STORE</h1>
            <span>المتجر الرسمي</span>
        </div>
        <div class="header-icons">
            <i class="fas fa-wallet" onclick="showWallet()"></i>
            <i class="fas fa-shopping-cart" onclick="showMyOrders()"><span class="badge" id="cartBadge">0</span></i>
            <i class="fas fa-bars" onclick="toggleSideMenu()"></i>
            <i class="far fa-user-circle" onclick="showAuthModal()" id="loginIcon"></i>
            <div id="userMenu" style="display: none;" onclick="toggleDropdown()">
                <span id="userName"></span>
                <i class="fas fa-chevron-down"></i>
                <div class="dropdown" id="userDropdown">
                    <a href="#" onclick="showWallet()">محفظتي</a>
                    <a href="#" onclick="showMyOrders()">طلباتي</a>
                    <a href="#" id="adminLink" style="display: none;" onclick="showAdminPanel()">🔧 لوحة المدير</a>
                    <a href="#" onclick="logout()">تسجيل خروج</a>
                </div>
            </div>
        </div>
    </div>

    <div id="sideMenu" class="side-menu">
        <div class="menu-header">
            <i class="fas fa-times" onclick="toggleSideMenu()"></i>
            <h3>القائمة</h3>
        </div>
        <ul class="menu-items">
            <li><a href="#" onclick="showMainCategories(); toggleSideMenu()"><i class="fas fa-home"></i> الرئيسية</a></li>
            <li id="adminMenuItem" style="display: none;"><a href="#" onclick="showAdminPanel(); toggleSideMenu()"><i class="fas fa-crown"></i> لوحة المدير</a></li>
            <li><a href="#" onclick="toggleTheme(); toggleSideMenu()"><i class="fas fa-sun"></i> الوضع الفاتح</a></li>
        </ul>
        <div class="menu-footer">
            <p>ALZAK STORE<br>©2025</p>
        </div>
    </div>

    <div class="breadcrumb" id="breadcrumb">
        <i class="fas fa-home" onclick="showMainCategories()"></i>
    </div>

    <div id="mainCategories" class="main-categories"></div>
    <div id="subContent" class="sub-content"></div>

    <div id="adminPanel" class="admin-panel">
        <div class="admin-header">
            <h2><i class="fas fa-crown"></i> لوحة التحكم</h2>
            <button onclick="hideAdminPanel()"><i class="fas fa-times"></i></button>
        </div>
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="showAdminTab('products')">المنتجات</button>
            <button class="tab-btn" onclick="showAdminTab('orders')">الطلبات</button>
            <button class="tab-btn" onclick="showAdminTab('users')">العملاء</button>
            <button class="tab-btn" onclick="showAdminTab('stats')">الإحصائيات</button>
        </div>
        <div id="adminProducts" class="admin-tab-content active"></div>
        <div id="adminOrders" class="admin-tab-content"></div>
        <div id="adminUsers" class="admin-tab-content"></div>
        <div id="adminStats" class="admin-tab-content"></div>
    </div>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('authModal')">&times;</span>
            <h2 style="text-align: center;">تسجيل الدخول</h2>
            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="loginPassword" placeholder="كلمة المرور">
            <button onclick="loginWithEmail()">دخول</button>
            <p style="text-align: center; margin: 10px 0;">أو</p>
            <button onclick="loginWithGoogle()" style="background: #fff; color: #000;">تسجيل بحساب Google</button>
            <p style="text-align: center; margin-top: 15px;">ليس لديك حساب؟ <a href="#" onclick="showRegisterModal()" style="color: #fbbf24;">سجل الآن</a></p>
        </div>
    </div>

    <div id="registerModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('registerModal')">&times;</span>
            <h2 style="text-align: center;">تسجيل جديد</h2>
            <input type="text" id="regName" placeholder="الاسم">
            <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="regPassword" placeholder="كلمة المرور">
            <button onclick="registerWithEmail()">تسجيل</button>
        </div>
    </div>

    <div id="purchaseModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('purchaseModal')">&times;</span>
            <h2 style="text-align: center;">تأكيد الشراء</h2>
            <div id="purchaseDetails" style="margin: 15px 0;"></div>
            <input type="text" id="playerId" placeholder="معرف اللعبة / الحساب">
            <button onclick="confirmPurchase()">تأكيد الشراء</button>
        </div>
    </div>

    <div id="walletModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('walletModal')">&times;</span>
            <h2 style="text-align: center;">محفظتي</h2>
            <div style="font-size: 36px; color: #fbbf24; text-align: center; margin: 20px 0;" id="walletBalance">0$</div>
            <h3>شحن الرصيد</h3>
            <select id="chargeAmount">
                <option value="5">5 $</option>
                <option value="10">10 $</option>
                <option value="20">20 $</option>
                <option value="50">50 $</option>
            </select>
            <button onclick="requestCharge()">طلب شحن</button>
            <h3 style="margin-top: 20px;">آخر الحركات</h3>
            <div id="walletTransactions"></div>
        </div>
    </div>

    <div id="ordersModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('ordersModal')">&times;</span>
            <h2 style="text-align: center;">طلباتي</h2>
            <div id="ordersList"></div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, where, getDocs, orderBy, limit, updateDoc, deleteDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCO_VTLgQkTOv_MkB0SEdSEYdRMi9IdMFA",
            authDomain: "alzak-store-dea53.firebaseapp.com",
            projectId: "alzak-store-dea53",
            storageBucket: "alzak-store-dea53.firebasestorage.app",
            messagingSenderId: "494547602038",
            appId: "1:494547602038:web:f9f78605414173ae63ed57"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const defaultStoreData = {
            sections: [
                {
                    id: 'games',
                    name: 'الألعاب',
                    icon: 'fa-gamepad',
                    image: 'https://i.ibb.co/vc4DVH2C/Screenshot-20260312-002402.png',
                    categories: [
                        {
                            id: 'pubg',
                            name: 'PUBG',
                            image: 'https://i.ibb.co/vc4DVH2C/Screenshot-20260312-002402.png',
                            products: [
                                { name: '60 UC', price: 0.99 },
                                { name: '300 UC + 25', price: 4.99 },
                                { name: '600 UC + 60', price: 9.99 },
                                { name: '1500 UC + 300', price: 24.99 }
                            ]
                        },
                        {
                            id: 'freefire',
                            name: 'Free Fire',
                            image: 'https://i.ibb.co/vc4DVH2C/Screenshot-20260312-002402.png',
                            products: [
                                { name: '100 جوهرة', price: 1.50 },
                                { name: '341 جوهرة', price: 3.99 },
                                { name: '572 جوهرة', price: 5.99 }
                            ]
                        }
                    ]
                },
                {
                    id: 'apps',
                    name: 'التطبيقات',
                    icon: 'fa-mobile-alt',
                    image: 'https://i.ibb.co/dpjQfMPQ/Screenshot-20260312-001846.png',
                    categories: [
                        {
                            id: 'shahid',
                            name: 'شاهد VIP',
                            image: 'https://i.ibb.co/dpjQfMPQ/Screenshot-20260312-001846.png',
                            products: [
                                { name: 'شهر واحد', price: 5.99 },
                                { name: '3 شهور', price: 15.99 }
                            ]
                        },
                        {
                            id: 'netflix',
                            name: 'نتفلكس',
                            image: 'https://i.ibb.co/dpjQfMPQ/Screenshot-20260312-001846.png',
                            products: [
                                { name: 'شهر واحد', price: 7.99 },
                                { name: '3 شهور', price: 21.99 }
                            ]
                        }
                    ]
                },
                {
                    id: 'cards',
                    name: 'بطاقات جوجل',
                    icon: 'fa-google',
                    image: 'https://i.ibb.co/qF95JZfM/Screenshot-20260312-002552.png',
                    categories: [
                        {
                            id: 'google',
                            name: 'بطاقات جوجل بلاي',
                            image: 'https://i.ibb.co/qF95JZfM/Screenshot-20260312-002552.png',
                            products: [
                                { name: 'بطاقة 10$', price: 10.00 },
                                { name: 'بطاقة 25$', price: 25.00 }
                            ]
                        }
                    ]
                }
            ]
        };

        let storeData = (() => {
            try {
                const saved = localStorage.getItem('storeData');
                return saved ? JSON.parse(saved) : defaultStoreData;
            } catch {
                return defaultStoreData;
            }
        })();

        let currentUser = null;
        let currentPurchase = null;
        const ADMIN_EMAIL = 'alolao45y@gmail.com';

        window.loginWithEmail = async function() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
                document.getElementById('authModal').style.display = 'none';
                showToast('✅ مرحباً بعودتك');
            } catch (error) {
                showToast('❌ ' + error.message, 'error');
            }
        };

        window.loginWithGoogle = async function() {
            try {
                await signInWithPopup(auth, provider);
                document.getElementById('authModal').style.display = 'none';
                showToast('✅ مرحباً بك');
            } catch (error) {
                showToast('❌ ' + error.message, 'error');
            }
        };

        window.logout = async function() {
            await signOut(auth);
            showToast('✅ تم تسجيل الخروج');
            hideAdminPanel();
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = {
                    uid: user.uid,
                    email: user.email,
                    name: user.displayName || user.email.split('@')[0]
                };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                updateUI();
                updateAdminMenu();
                await createUserProfile(user);
                updateWalletDisplay();
            } else {
                currentUser = null;
                localStorage.removeItem('currentUser');
                updateUI();
                updateAdminMenu();
            }
        });

        async function createUserProfile(user) {
            const userRef = doc(db, 'users', user.uid);
            const docSnap = await getDoc(userRef);
            if (!docSnap.exists()) {
                await setDoc(userRef, {
                    email: user.email,
                    name: user.displayName || user.email.split('@')[0],
                    createdAt: new Date().toISOString(),
                    walletBalance: 0
                });
            }
        }

        async function getWalletBalance() {
            if (!currentUser) return 0;
            const docRef = doc(db, 'users', currentUser.uid);
            const docSnap = await getDoc(docRef);
            return docSnap.data()?.walletBalance || 0;
        }

        async function updateWalletDisplay() {
            if (!currentUser) return;
            const balance = await getWalletBalance();
            document.getElementById('walletBalance').textContent = balance + '$';
        }

        window.requestCharge = async function() {
            if (!currentUser) {
                showToast('❌ سجل دخول أولاً', 'error');
                showAuthModal();
                return;
            }
            const amount = parseFloat(document.getElementById('chargeAmount').value);
            await addDoc(collection(db, 'charges'), {
                userId: currentUser.uid,
                userEmail: currentUser.email,
                amount: amount,
                status: 'pending',
                date: new Date().toISOString()
            });
            showToast('✅ تم إرسال طلب الشحن');
            closeModal('walletModal');
        };

        window.confirmPurchase = async function() {
            if (!currentUser) {
                showToast('❌ سجل دخول أولاً', 'error');
                showAuthModal();
                return;
            }
            const playerId = document.getElementById('playerId').value;
            if (!playerId) {
                showToast('❌ أدخل معرف اللعبة', 'error');
                return;
            }
            showToast('✅ تم تأكيد الطلب');
            closeModal('purchaseModal');
        };

        window.showMainCategories = function() {
            const container = document.getElementById('mainCategories');
            if (!container) return;
            container.innerHTML = '';
            storeData.sections.forEach(section => {
                container.innerHTML += `
                    <div class="section-card" onclick="showCategories('${section.id}')">
                        <div class="section-image" style="background-image: url('${section.image}')">
                            <div class="section-overlay">
                                <i class="fas ${section.icon}"></i>
                                <h3>${section.name}</h3>
                            </div>
                        </div>
                    </div>
                `;
            });
        };

        window.showCategories = function(sectionId) {
            const section = storeData.sections.find(s => s.id === sectionId);
            if (!section) return;
            const container = document.getElementById('subContent');
            if (!container) return;
            container.innerHTML = `<h2 style="color: #fbbf24; text-align: center; margin: 15px;">${section.name}</h2>`;
            section.categories.forEach(cat => {
                container.innerHTML += `
                    <div class="category-card" onclick="showProducts('${section.id}', '${cat.id}')">
                        <div class="category-image" style="background-image: url('${cat.image}')">
                            <div class="category-overlay">
                                <h4>${cat.name}</h4>
                            </div>
                        </div>
                    </div>
                `;
            });
        };

        window.showProducts = function(sectionId, categoryId) {
            const section = storeData.sections.find(s => s.id === sectionId);
            if (!section) return;
            const category = section.categories.find(c => c.id === categoryId);
            if (!category) return;
            const container = document.getElementById('subContent');
            if (!container) return;
            let html = `<h2 style="color: #fbbf24; text-align: center; margin: 15px;">${category.name}</h2><div class="products-grid">`;
            category.products.forEach(prod => {
                html += `
                    <div class="product-card" onclick="openPurchaseModal('${prod.name}', ${prod.price})">
                        <h4>${prod.name}</h4>
                        <p class="price">${prod.price} $</p>
                        <button class="buy-btn">اشتري</button>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        };

        window.openPurchaseModal = function(name, price) {
            if (!currentUser) {
                showToast('سجل دخول أولاً', 'error');
                showAuthModal();
                return;
            }
            currentPurchase = { name, price };
            document.getElementById('purchaseDetails').innerHTML = `<p>المنتج: ${name}</p><p>السعر: ${price}$</p>`;
            document.getElementById('purchaseModal').style.display = 'flex';
        };

        function isAdmin() {
            return currentUser && currentUser.email === ADMIN_EMAIL;
        }

        window.showAdminPanel = function() {
            if (!isAdmin()) {
                showToast('غير مصرح', 'error');
                return;
            }
            document.getElementById('adminPanel').style.display = 'block';
        };

        window.hideAdminPanel = function() {
            document.getElementById('adminPanel').style.display = 'none';
        };

        window.toggleSideMenu = function() {
            document.getElementById('sideMenu').classList.toggle('show');
        };

        window.toggleTheme = function() {
            document.body.classList.toggle('light-mode');
        };

        function updateAdminMenu() {
            const adminMenuItem = document.getElementById('adminMenuItem');
            if (adminMenuItem) {
                adminMenuItem.style.display = isAdmin() ? 'block' : 'none';
            }
            const adminLink = document.getElementById('adminLink');
            if (adminLink) {
                adminLink.style.display = isAdmin() ? 'block' : 'none';
            }
        }

        window.showToast = function(message, type = 'success') {
            const toast = document.getElementById('toast');
            if (!toast) return;
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        };

        window.showAuthModal = function() {
            document.getElementById('authModal').style.display = 'flex';
        };

        window.showRegisterModal = function() {
            closeModal('authModal');
            document.getElementById('registerModal').style.display = 'flex';
        };

        window.closeModal = function(id) {
            document.getElementById(id).style.display = 'none';
        };

        window.toggleDropdown = function() {
            const d = document.getElementById('userDropdown');
            if (d) d.style.display = d.style.display === 'none' ? 'block' : 'none';
        };

        window.showWallet = function() {
            if (!currentUser) {
                showToast('سجل دخول أولاً', 'error');
                showAuthModal();
                return;
            }
            updateWalletDisplay();
            document.getElementById('walletModal').style.display = 'flex';
        };

        window.showMyOrders = function() {
            showToast('طلباتك قريباً');
        };

        function updateUI() {
            const loginIcon = document.getElementById('loginIcon');
            const userMenu = document.getElementById('userMenu');
            const userName = document.getElementById('userName');
            if (currentUser) {
                if (loginIcon) loginIcon.style.display = 'none';
                if (userMenu) {
                    userMenu.style.display = 'flex';
                    if (userName) userName.textContent = currentUser.name;
                }
            } else {
                if (loginIcon) loginIcon.style.display = 'block';
                if (userMenu) userMenu.style.display = 'none';
            }
        }

        window.testFirebase = function() {
            console.log("✅ Firebase initialized");
            showToast("✅ Firebase متصل");
        };

        window.onload = function() {
            showMainCategories();
            updateUI();
            updateAdminMenu();
        };
    </script>
</body>
</html>
