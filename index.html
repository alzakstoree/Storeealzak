<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALZAK STORE</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"></script>
</head>
<body style="background:#111; color:#fff; direction:rtl; padding:20px;">
    <h1 style="color:#fbbf24;">ALZAK STORE</h1>
    
    <div id="status"></div>
    
    <button onclick="login()" style="background:#fbbf24; padding:10px 20px; border-radius:10px;">تسجيل دخول المدير</button>
    
    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyCO_VTLgQkTOv_MkB0SEdSEYdRMi9IdMFA",
            authDomain: "alzak-store-dea53.firebaseapp.com",
            projectId: "alzak-store-dea53"
        });

        const auth = firebase.auth();
        const db = firebase.firestore();

        function log(msg) {
            document.getElementById('status').innerHTML += `<div>${msg}</div>`;
        }

        window.login = async () => {
            try {
                await auth.signInWithEmailAndPassword('alolao45y@gmail.com', 'admin123');
                log('✅ تم تسجيل الدخول');
                
                const snapshot = await db.collection('orders').get();
                log(`📦 عدد الطلبات: ${snapshot.size}`);
                
                snapshot.forEach(doc => {
                    const o = doc.data();
                    log(`- ${o.product}: ${o.price}$ (${o.status})`);
                });
            } catch (e) {
                log('❌ ' + e.message);
            }
        };
    </script>
</body>
</html>
