<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALZAK STORE | متجر شحن الألعاب</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="admin-bar">
        <span><i class="fas fa-crown" style="color: #fbbf24;"></i> لوحة المدير</span>
        <button class="admin-btn" onclick="toggleAdminPanel()">عرض الطلبات</button>
    </div>

    <div class="top-bar">
        <div class="secure"><i class="fas fa-shield-alt"></i> تسوق آمن</div>
        <div class="secure"><i class="fas fa-bolt"></i> شحن فوري</div>
    </div>

    <div class="header">
        <div class="logo">
            <h1>ALZAK STORE</h1>
            <span>متجر الشحن الرسمي</span>
        </div>
    </div>

    <div class="categories">
        <div class="cat active">الكل</div>
        <div class="cat">PUBG</div>
        <div class="cat">Free Fire</div>
    </div>

    <div class="games-grid">
        <div class="game-card">
            <div class="game-image">
                <img src="https://img.redbull.com/images/c_fill,g_auto,w_450,h_750/q_auto,f_auto/redbullcom/2017/07/18/2dd60382-b4b5-41ff-8ff4-bf364f301fa2/pubg-pro-players.jpg.jpg" alt="PUBG">
            </div>
            <h3>PUBG Mobile</h3>
            <div class="game-stats">
                <span class="rating">⭐ 4.9</span>
                <span class="packs-count">6 باقات</span>
            </div>
        </div>
        <div class="game-card">
            <div class="game-image">
                <img src="https://images.hindustantimes.com/tech/img/2022/06/23/414x233/54f31449f5f91cf0cc223cc635cd5952jpg_1655955051259_1655955067513.jpeg" alt="Free Fire">
            </div>
            <h3>Free Fire</h3>
            <div class="game-stats">
                <span class="rating">⭐ 4.8</span>
                <span class="packs-count">5 باقات</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
