<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>تأكيد الإيداع - ALZAK STORE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .confirm-header {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #000;
            border-bottom: 3px solid #fbbf24;
        }
        .confirm-header i {
            font-size: 24px;
            cursor: pointer;
            color: #fbbf24;
            margin-left: 15px;
        }
        .confirm-header h1 {
            font-size: 20px;
            color: #fbbf24;
        }
        .confirm-container {
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }
        .method-info {
            background: #1a1a1a;
            border: 2px solid #fbbf24;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .method-info h2 {
            color: #fbbf24;
            margin-bottom: 15px;
            text-align: center;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
            padding: 10px;
            background: #333;
            border-radius: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .info-row span:first-child {
            color: #888;
            font-size: 14px;
        }
        .info-row span:last-child {
            color: #fbbf24;
            direction: ltr;
            word-break: break-all;
            max-width: 100%;
            overflow-wrap: break-word;
            font-size: 14px;
            flex: 1;
        }
        .copy-btn {
            background: #fbbf24;
            color: #000;
            border: none;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }
        .form-group {
            margin: 20px 0;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #fbbf24;
        }
        .form-group input, .form-group input[type="file"] {
            width: 100%;
            padding: 12px;
            background: #333;
            border: 1px solid #fbbf24;
            border-radius: 10px;
            color: #fff;
        }
        /* ===== حقل رفع الصورة الجديد ===== */
        .upload-container {
            position: relative;
            width: 100%;
            margin-top: 10px;
        }
        .upload-container input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 2;
        }
        .upload-area {
            background: #1a1a1a;
            border: 2px dashed #fbbf24;
            border-radius: 15px;
            padding: 30px 20px;
            text-align: center;
            transition: 0.3s;
            z-index: 1;
        }
        .upload-area:hover {
            background: #222;
            border-color: #fbbf24;
        }
        .upload-area i {
            font-size: 40px;
            color: #fbbf24;
            margin-bottom: 10px;
        }
        .upload-area p {
            color: #fff;
            font-size: 16px;
            margin-bottom: 5px;
        }
        .upload-area span {
            color: #888;
            font-size: 12px;
        }
        .preview-container {
            position: relative;
            margin-top: 15px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #fbbf24;
            display: none;
        }
        .preview-container img {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            display: block;
        }
        .remove-image {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #fbbf24;
            color: #000;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .remove-image:hover {
            background: #fff;
        }
        .submit-btn {
            width: 100%;
            background: #fbbf24;
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        .note {
            text-align: center;
            color: #888;
            font-size: 12px;
            margin-top: 10px;
        }
        @media (max-width: 480px) {
            .info-row {
                flex-direction: column;
                align-items: flex-start;
            }
            .info-row span:last-child {
                font-size: 12px;
                width: 100%;
            }
            .copy-btn {
                width: 100%;
                margin-top: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="confirm-header">
        <i class="fas fa-arrow-right" onclick="goBack()"></i>
        <h1>تأكيد الإيداع</h1>
    </div>

    <div class="confirm-container" id="confirmContainer">
        <!-- سيتم تعبئتها عبر JavaScript -->
    </div>

    <script>
        // بيانات طرق الدفع (نفس البيانات من الصفحة السابقة)
        const paymentMethods = [
            {
                name: 'شام كاش',
                walletNumber: '053b8f0d907772543d262622121d6df2',
                image: 'https://i.ibb.co/5XhmqrJq/Screenshot-20260313-152931.jpg',
                accountName: 'اسحاق وسام الاسماعيل'
            },
            {
                name: 'يا مرسال',
                walletNumber: 'TDwUTu5vTi8oscYymqbyqcK9E3aZrtiuyk',
                image: 'https://i.ibb.co/4ZcSH80M/Screenshot-20260313-152751.jpg',
                accountName: 'ALZAK STORE'
            },
            {
                name: 'ليرات',
                walletNumber: 'L793143293',
                image: 'https://i.ibb.co/5hm3cHSk/Screenshot-20260313-153215.jpg',
                accountName: 'ALZAK STORE'
            }
        ];

        // عرض معلومات طريقة الدفع المختارة
        function displayPaymentConfirm() {
            const methodName = localStorage.getItem('selectedPaymentMethod');
            if (!methodName) {
                window.location.href = 'payment-methods.html';
                return;
            }

            const method = paymentMethods.find(m => m.name === methodName);
            if (!method) return;

            const container = document.getElementById('confirmContainer');
            container.innerHTML = `
                <div class="method-info">
                    <h2>${method.name}</h2>
                    <div class="info-row">
                        <span>رقم المحفظة:</span>
                        <span>${method.walletNumber}</span>
                        <button class="copy-btn" onclick="copyToClipboard('${method.walletNumber}')">نسخ</button>
                    </div>
                    <div class="info-row">
                        <span>الاسم:</span>
                        <span>${method.accountName}</span>
                        <button class="copy-btn" onclick="copyToClipboard('${method.accountName}')">نسخ</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>المبلغ الذي قمت بتحويله ($) (الحد الأدنى 2$)</label>
                    <input type="number" id="depositAmount" min="2" step="0.01" placeholder="أدخل المبلغ">
                </div>

                <div class="form-group">
                    <label>رقم العملية (Transaction ID)</label>
                    <input type="text" id="transactionId" placeholder="أدخل رقم العملية">
                </div>

                <div class="form-group">
                    <label>صورة الإيصال</label>
                    <div class="upload-container">
                        <input type="file" id="receiptImage" accept="image/*" onchange="previewImage(event)">
                        <div class="upload-area" id="uploadArea">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p>اضغط لاختيار صورة الإيصال</p>
                            <span>أو اسحب وأفلت</span>
                        </div>
                        <div class="preview-container" id="previewContainer">
                            <img id="previewImage" src="" alt="معاينة الإيصال">
                            <button type="button" class="remove-image" onclick="removeImage()">✕</button>
                        </div>
                    </div>
                </div>

                <button class="submit-btn" onclick="submitDeposit()">📤 إرسال طلب الإيداع</button>
                <div class="note">سيتم مراجعة طلبك وإضافة الرصيد بعد التأكيد</div>
            `;
        }

        // معاينة الصورة بعد اختيارها
        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('previewImage').src = e.target.result;
                    document.getElementById('previewContainer').style.display = 'block';
                    document.querySelector('.upload-area').style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        }

        // إزالة الصورة المختارة
        function removeImage() {
            document.getElementById('receiptImage').value = '';
            document.getElementById('previewContainer').style.display = 'none';
            document.querySelector('.upload-area').style.display = 'block';
        }

        // نسخ النص
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('✅ تم النسخ');
            }).catch(() => {
                alert('❌ فشل النسخ');
            });
        }

        // إرسال طلب الإيداع
        function submitDeposit() {
            const methodName = localStorage.getItem('selectedPaymentMethod');
            const amount = document.getElementById('depositAmount')?.value;
            const transactionId = document.getElementById('transactionId')?.value;
            const fileInput = document.getElementById('receiptImage');

            if (!amount || amount < 2) {
                alert('❌ المبلغ يجب أن يكون 2$ على الأقل');
                return;
            }

            if (!transactionId) {
                alert('❌ أدخل رقم العملية');
                return;
            }

            if (!fileInput || fileInput.files.length === 0) {
                alert('❌ ارفع صورة الإيصال');
                return;
            }

            // رسالة واتساب
            const msg = `💰 طلب إيداع جديد
════════════════
طريقة الدفع: ${methodName}
المبلغ: ${amount}$
رقم العملية: ${transactionId}
════════════════`;

            window.open(`https://wa.me/9630982251929?text=${encodeURIComponent(msg)}`, '_blank');
            alert('✅ تم إرسال الطلب');
            
            // العودة لصفحة المحفظة بعد ثانيتين
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 2000);
        }

        // العودة للصفحة السابقة
        function goBack() {
            window.history.back();
        }

        // تشغيل العرض عند تحميل الصفحة
        displayPaymentConfirm();
    </script>
</body>
</html>
